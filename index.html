function buildBP(annualCA,moisDebut=0){
  const ramp=[0.055,0.065,0.075,0.08,0.085,0.09,0.09,0.085,0.085,0.08,0.08,0.075];
  return Array.from({length:12},(_,i)=>{

    const row={mi:(moisDebut+i)%12,_ca:ca};
    BP_LINES.forEach(l=>{row[l.id]=l.fixed??Math.round(ca*(l.pctCA||0));});
    row._charges=CHARGES.reduce((s,l)=>s+row[l.id],0);
    row._result=ca-row._charges;
    return row;
  });
}

  }).join('');

    <div class="cards">${extras.map(id=>renderCard(id,S.studios[id])).join('')}</div>`;

  h+=`<div class="box" style="margin-top:16px;background:#f5f5f0">

function renderWorkflow(s){
  const canEdit=S.profile?.role==='admin';
  let h=`<div class="box">${progBar(s.steps)}<div style="margin-top:16px">`;
  STEPS.forEach((step,i)=>{
    const done=s.steps[step.id];
    const unlocked=i===0||s.steps[STEPS[i-1].id];
    const opacity=(!done&&!unlocked)?0.4:1;
    const bg=done?'#1D9E75':'transparent';
    const border=done?'#1D9E75':unlocked?'#aaa':'#ddd';
    const cursor=(unlocked&&canEdit)?'pointer':'default';
    h+=`<div class="step-row" style="opacity:${opacity}">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="step-dot" style="background:${bg};border:2px solid ${border};cursor:${cursor}" onclick="${unlocked&&canEdit?`toggleStep('${S.selectedId}','${step.id}')`:''}">${done?'✓':''}</div>
        ${i<STEPS.length-1?`<div style="width:2px;flex:1;min-height:14px;background:${done?'#1D9E75':'#e0e0d8'};margin-top:2px"></div>`:''}
      </div>
      <div style="padding-bottom:8px">
        <div style="font-size:13px;font-weight:${done?600:400}">${step.label}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${step.desc}</div>
      </div>
    </div>`;
  });
  h+='</div></div>';
  return h;
}

function renderForecast(s){
  const {forecastSection,editMoisIdx,editVals}=S;
  const {moisDebut,annee,actuel,annualCA}=s.forecast;
  const bp=buildBP(annualCA,moisDebut);
  const totals=bp.map((r,idx)=>{
    const a=actuel[idx]||{};
    const hasReal=Object.keys(a).length>0;
    const aCA=hasReal?num(a.ca_cours)+num(a.ca_prives)+num(a.ca_boutique):null;
    const aCharges=hasReal?CHARGES.reduce((sum,l)=>sum+num(a[l.id],r[l.id]),0):null;
    return{bpCA:r._ca,bpCharges:r._charges,bpResult:r._result,aCA,aCharges,aResult:hasReal?aCA-aCharges:null,hasReal};
  });
  const rm=totals.filter(t=>t.hasReal);
  const cumBPCA=totals.reduce((s,t)=>s+t.bpCA,0);
  const cumActCA=rm.reduce((s,t)=>s+t.aCA,0);
  const cumBPRes=totals.reduce((s,t)=>s+t.bpResult,0);
  const cumActRes=rm.reduce((s,t)=>s+t.aResult,0);
  const refCA=rm.reduce((s,t)=>s+t.bpCA,0);
  const ecart=refCA?Math.round((cumActCA/refCA-1)*100):0;

  let h=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
    ${[['CA BP annuel',fmt(annualCA),''],['CA réel cumulé',fmt(cumActCA),''],['Ecart CA',(ecart>=0?'+':'')+ecart+'%',ecart>=0?'#3B6D11':'#A32D2D'],['Résultat BP',fmt(cumBPRes),''],['Résultat réel',fmt(cumActRes),'']].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="${c?'color:'+c:''}">${v}</div></div>`).join('')}
  </div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    ${[['summary','Synthèse'],['detail','Détail'],['saisie','Saisie']].map(([k,l])=>`<button class="tab ${forecastSection===k?'active':''}" onclick="setFS('${k}')">${l}</button>`).join('')}
  </div>`;

  if(forecastSection==='summary'){
    const rows=[
      {l:'CA — BP',vals:totals.map(t=>t.bpCA),tot:cumBPCA,bold:true},
      {l:'CA — Réel',vals:totals.map(t=>t.aCA),tot:cumActCA,blue:true},
      {l:'Charges — BP',vals:totals.map(t=>t.bpCharges),tot:totals.reduce((s,t)=>s+t.bpCharges,0)},
      {l:'Résultat — BP',vals:totals.map(t=>t.bpResult),tot:cumBPRes,bold:true},
      {l:'Résultat — Réel',vals:totals.map(t=>t.aResult),tot:cumActRes,blue:true,res:true},
    ];
    h+=`<div class="forecast-table"><table>
      <tr><th style="text-align:left;padding-left:8px">Ligne</th>${bp.map(r=>`<th>${MOIS[r.mi]}</th>`).join('')}<th>Total</th></tr>
      ${rows.map(row=>`<tr style="background:${row.bold?'#f5f5f0':''}">
        <td class="lbl" style="font-weight:${row.bold?600:400}">${row.l}</td>
        ${row.vals.map(v=>`<td style="color:${row.blue&&v!==null?(row.res?(v>=0?'#3B6D11':'#A32D2D'):'#185FA5'):'inherit'}">${v===null?'—':fmtN(v)}</td>`).join('')}
        <td style="font-weight:600">${row.tot?fmtN(row.tot):'—'}</td>
      </tr>`).join('')}
    </table></div>`;
  }

  if(forecastSection==='detail'){
    h+=`<div class="forecast-table"><table>
      <tr><th style="text-align:left;padding-left:8px;min-width:140px">Ligne</th>${bp.map(r=>`<th>${MOIS[r.mi]}</th>`).join('')}</tr>
      <tr><td class="lbl" colspan="13" style="background:#f5f5f0;font-weight:600;padding:5px 8px">PRODUITS</td></tr>
      ${PRODUITS.map(l=>`<tr><td class="lbl">${l.label}</td>${bp.map((r,i)=>{const a=actuel[i]?.[l.id];return`<td><div style="font-size:10px">${fmtN(r[l.id])}</div>${a!==undefined?`<div style="font-size:10px;color:#185FA5;font-weight:600">${fmtN(a)}</div>`:''}</td>`;}).join('')}</tr>`).join('')}
      <tr><td class="lbl" colspan="13" style="background:#f5f5f0;font-weight:600;padding:5px 8px">CHARGES</td></tr>
      ${CHARGES.map(l=>`<tr><td class="lbl">${l.label}</td>${bp.map((r,i)=>{const a=actuel[i]?.[l.id];return`<td><div style="font-size:10px">${fmtN(r[l.id])}</div>${a!==undefined?`<div style="font-size:10px;color:#185FA5;font-weight:600">${fmtN(a)}</div>`:''}</td>`;}).join('')}</tr>`).join('')}
      <tr style="background:#f5f5f0"><td class="lbl" style="font-weight:600">RÉSULTAT NET</td>${totals.map((t,i)=>`<td><div style="font-size:10px;font-weight:600">${fmtN(bp[i]._result)}</div>${t.hasReal?`<div style="font-size:10px;color:${t.aResult>=0?'#3B6D11':'#A32D2D'};font-weight:600">${fmtN(t.aResult)}</div>`:''}</td>`).join('')}</tr>
    </table></div><div style="font-size:10px;color:#888">Gris = BP · Bleu = Réel saisi</div>`;
  }

  if(forecastSection==='saisie'){
    h+=`<div class="months-grid">${bp.map((r,idx)=>{
      const ok=actuel[idx]&&Object.keys(actuel[idx]).length>0;
      return`<button class="month-btn ${ok?'ok':''}" onclick="openEditMois(${idx})">${MOIS[r.mi]} ${annee}${ok?' ✓':''}</button>`;
    }).join('')}</div>`;
    if(editMoisIdx!==null){
      const r=bp[editMoisIdx];
      h+=`<div class="box">
        <div style="font-weight:600;font-size:14px;margin-bottom:4px">Saisie — ${MOIS[r.mi]} ${annee}</div>
        <div style="font-size:12px;color:#888;margin-bottom:12px">Laissez vide pour garder la valeur BP</div>
        <div class="sec-title">Produits</div>
        <div class="edit-grid">${PRODUITS.map(l=>`<div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">${l.label} <span style="color:#bbb">(${fmtN(r[l.id])})</span></label><input type="number" value="${editVals[l.id]||''}" oninput="setEV('${l.id}',this.value)" placeholder="${r[l.id]}" style="width:100%;padding:7px 9px;border:0.5px solid #ddd;border-radius:7px;font-size:12px;outline:none"/></div>`).join('')}</div>
        <div class="sec-title">Charges</div>
        <div class="edit-grid">${CHARGES.map(l=>`<div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">${l.label} <span style="color:#bbb">(${fmtN(r[l.id])})</span></label><input type="number" value="${editVals[l.id]||''}" oninput="setEV('${l.id}',this.value)" placeholder="${r[l.id]}" style="width:100%;padding:7px 9px;border:0.5px solid #ddd;border-radius:7px;font-size:12px;outline:none"/></div>`).join('')}</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-primary" onclick="saveMois()">Enregistrer</button>
          <button class="btn" onclick="clearMois()">Effacer</button>
          <button class="btn" onclick="cancelEdit()">Annuler</button>
        </div>
      </div>`;
    }
  }
  return h;
}

async function uploadFichier(studioId,input){
  const files=Array.from(input.files);
  if(!files.length)return;
  const prog=document.getElementById('uprog-'+studioId);
  if(prog)prog.style.display='block';

  // Nettoyer le nom de fichier (supprimer accents, espaces, caractères spéciaux)
  const cleanName=name=>name
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // supprimer accents
    .replace(/[^a-zA-Z0-9._-]/g,'_')                   // remplacer caractères spéciaux par _
    .replace(/_+/g,'_');                                // éviter les __ consécutifs

  const {data:existing}=await sb.from('studios').select('data').eq('id',studioId+'_files').maybeSingle();
  const currentFiles=[...(existing?.data?.files||S.files[studioId]||[])];

  let added=0;
  for(const file of files){
    const safeName=cleanName(file.name);
    const path=`${studioId}/${Date.now()}_${safeName}`;
    const {error}=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
    if(error){console.error('upload error',error);continue;}
    const {data:urlData}=sb.storage.from('studio-files').getPublicUrl(path);
    const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' Mo':(file.size/1024).toFixed(0)+' Ko';
    currentFiles.push({name:file.name,path,url:urlData.publicUrl,date:new Date().toLocaleDateString('fr-FR'),size});
    added++;
  }

  const {error:saveErr}=await sb.from('studios').upsert({
    id:studioId+'_files',
    data:{files:currentFiles},
    updated_at:new Date().toISOString()
  });
  if(saveErr){console.error('save error',saveErr);toast('Erreur sauvegarde');return;}

  S.files[studioId]=currentFiles;
  if(prog)prog.style.display='none';
  toast(added+' fichier(s) ajouté(s)');
  render();
}

async function deleteFichier(studioId,path){
  if(!confirm('Supprimer ce fichier ?'))return;
  await sb.storage.from('studio-files').remove([path]);
  S.files[studioId]=(S.files[studioId]||[]).filter(f=>f.path!==path);
  await sb.from('studios').upsert({id:studioId+'_files',data:{files:S.files[studioId]},updated_at:new Date().toISOString()});
  toast('Fichier supprimé');
  render();
}

async function archiverStudio(id){

  toast('Studio archivé');
}

async function restaurerStudio(id){
  const s=S.studios[id];

async function supprimerStudio(id){

  await sb.from('studios').delete().eq('id',id);

function renderPipeline(visibleIds){

  const coreIds = ['lattes','garenne','levallois','issy','toulouse'];
  const extraIds = visibleIds.filter(id=>!coreIds.includes(id));
  const cohortes = [
    {label:'Cohorte 1 — 2026',ids:['lattes','garenne','levallois','issy'],note:'5 studios · 1,53M€ CAPEX'},
    {label:'Cohorte 2 — 2027',ids:['toulouse'],note:'5 studios dont Montpellier Nord'},
    {label:'Cohorte 3 — 2028',ids:[],note:'5 studios · à confirmer'},
    {label:'Cohorte 4 — 2029',ids:[],note:'2 studios · Total 17'},
  ];
  let html = cohortes.map(c=>{
    const chips=c.ids.filter(id=>studios[id]).map(id=>`<span class="chip" onclick="openDetail('${id}')">${studios[id].name}</span>`).join('');
    return `<div class="pipeline-card">
      <div class="pipeline-header"><span style="font-weight:600">${c.label}</span><span style="font-size:11px;color:#888">${c.note}</span></div>

    <div class="cards">${extraIds.map(id=>renderCard(id,studios[id])).join('')}</div>`;
  }
  html+=`<div class="pipeline-card" style="margin-top:16px;background:#f5f5f0">
    <div style="font-weight:600;font-size:13px;margin-bottom:10px">Valorisation DCF — Plan 17 studios</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px">
      ${[['Equity Value','30,8 M€'],['MOIC','18,1x'],['TRI','78%'],['CA A10','15,7 M€'],['EBITDA A10','6,8 M€'],['FCF cumulé','32,5 M€']].map(([l,v])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="font-size:13px">${v}</div></div>`).join('')}

function renderWorkflow(s){
  const canEdit = STATE.profile?.role==='admin';
  let html='<div class="workflow-wrap">'+progressBar(s.steps)+'<div style="margin-top:16px">';
  STEPS.forEach((step,i)=>{
    const done=s.steps[step.id];
    const unlocked=i===0||s.steps[STEPS[i-1].id];
    const opacity=(!done&&!unlocked)?0.4:1;
    const circleBg=done?'#1D9E75':'transparent';
    const circleBorder=done?'#1D9E75':unlocked?'#aaa':'#ddd';
    const cursor=(unlocked&&canEdit)?'pointer':'default';
    html+=`<div class="step-row" style="opacity:${opacity}">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="step-circle" style="background:${circleBg};border:2px solid ${circleBorder};cursor:${cursor}" onclick="${unlocked&&canEdit?`toggleStep('${STATE.selectedId}','${step.id}')`:''}">${done?'✓':''}</div>
        ${i<STEPS.length-1?`<div class="step-line" style="background:${done?'#1D9E75':'#e0e0d8'}"></div>`:''}
      </div>
      <div style="padding-bottom:8px"><div class="step-label" style="font-weight:${done?600:400}">${step.label}</div><div class="step-desc">${step.desc}</div></div>
    </div>`;
  });
  html+='</div></div>';
  return html;
}

function renderForecast(s){
  const {forecastSection, editMoisIdx, editVals} = STATE;
  const {moisDebut,annee,actuel,annualCA} = s.forecast;
  const bp = buildBP(annualCA, moisDebut);
  const totals = bp.map((r,idx)=>{
    const a=actuel[idx]||{};
    const hasReal=Object.keys(a).length>0;
    const aCA=hasReal?num(a.ca_cours)+num(a.ca_prives)+num(a.ca_boutique):null;
    const aCharges=hasReal?CHARGES.reduce((sum,l)=>sum+num(a[l.id],r[l.id]),0):null;
    return {bpCA:r._ca,bpCharges:r._charges,bpResult:r._result,aCA,aCharges,aResult:hasReal?aCA-aCharges:null,hasReal};
  });
  const realMonths=totals.filter(t=>t.hasReal);
  const cumBPCA=totals.reduce((s,t)=>s+t.bpCA,0);
  const cumActCA=realMonths.reduce((s,t)=>s+t.aCA,0);
  const cumBPRes=totals.reduce((s,t)=>s+t.bpResult,0);
  const cumActRes=realMonths.reduce((s,t)=>s+t.aResult,0);
  const refBPCA=realMonths.reduce((s,t)=>s+t.bpCA,0);
  const ecartCA=refBPCA?Math.round((cumActCA/refBPCA-1)*100):0;

  let html=`<div class="forecast-kpis">
    ${[['CA BP annuel',fmt(annualCA)],['CA réel cumulé',fmt(cumActCA)],['Ecart CA',(ecartCA>=0?'+':'')+ecartCA+'%',ecartCA>=0?'#3B6D11':'#A32D2D'],['Résultat BP',fmt(cumBPRes)],['Résultat réel',fmt(cumActRes)]].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="${c?'color:'+c:''}">${v}</div></div>`).join('')}
  </div>
  <div class="tabs" style="margin-bottom:12px">
    <button class="tab ${forecastSection==='summary'?'active':''}" onclick="setForecastSection('summary')">Synthèse</button>
    <button class="tab ${forecastSection==='detail'?'active':''}" onclick="setForecastSection('detail')">Détail complet</button>
    <button class="tab ${forecastSection==='saisie'?'active':''}" onclick="setForecastSection('saisie')">Saisie mensuelle</button>
  </div>`;

  if(forecastSection==='summary'){
    const rows=[
      {label:'CA — BP',vals:totals.map(t=>t.bpCA),total:cumBPCA,bold:true},
      {label:'CA — Réel',vals:totals.map(t=>t.aCA),total:cumActCA,blue:true},
      {label:'Charges — BP',vals:totals.map(t=>t.bpCharges),total:totals.reduce((s,t)=>s+t.bpCharges,0)},
      {label:'Résultat — BP',vals:totals.map(t=>t.bpResult),total:cumBPRes,bold:true},
      {label:'Résultat — Réel',vals:totals.map(t=>t.aResult),total:cumActRes,blue:true,result:true},
    ];
    html+=`<div class="forecast-table"><table>
      <tr><th style="text-align:left;padding-left:8px">Ligne</th>${bp.map(r=>`<th>${MOIS[r.mi]}</th>`).join('')}<th>Total</th></tr>
      ${rows.map(row=>`<tr style="background:${row.bold?'#f5f5f0':''}">
        <td class="label-cell" style="font-weight:${row.bold?600:400}">${row.label}</td>
        ${row.vals.map(v=>`<td style="color:${row.blue&&v!==null?(row.result?(v>=0?'#3B6D11':'#A32D2D'):'#185FA5'):'inherit'}">${v===null?'—':fmtN(v)}</td>`).join('')}
        <td style="font-weight:600">${row.total?fmtN(row.total):'—'}</td>
      </tr>`).join('')}
    </table></div>`;
  }

  if(forecastSection==='detail'){
    html+=`<div class="forecast-table"><table>
      <tr><th style="text-align:left;padding-left:8px;min-width:150px">Ligne</th>${bp.map(r=>`<th>${MOIS[r.mi]}</th>`).join('')}</tr>
      <tr><td class="label-cell" colspan="${13}" style="background:#f5f5f0;font-weight:600;padding:6px 8px">PRODUITS</td></tr>
      ${PRODUITS.map(line=>`<tr><td class="label-cell">${line.label}</td>${bp.map((r,i)=>{const a=actuel[i]?.[line.id];return `<td><div style="font-size:10px">${fmtN(r[line.id])}</div>${a!==undefined?`<div style="font-size:10px;color:#185FA5;font-weight:600">${fmtN(a)}</div>`:''}</td>`}).join('')}</tr>`).join('')}
      <tr><td class="label-cell" colspan="${13}" style="background:#f5f5f0;font-weight:600;padding:6px 8px">CHARGES</td></tr>
      ${CHARGES.map(line=>`<tr><td class="label-cell">${line.label}</td>${bp.map((r,i)=>{const a=actuel[i]?.[line.id];return `<td><div style="font-size:10px">${fmtN(r[line.id])}</div>${a!==undefined?`<div style="font-size:10px;color:#185FA5;font-weight:600">${fmtN(a)}</div>`:''}</td>`}).join('')}</tr>`).join('')}
      <tr style="background:#f5f5f0"><td class="label-cell" style="font-weight:600">RÉSULTAT NET</td>${totals.map((t,i)=>`<td><div style="font-size:10px;font-weight:600">${fmtN(bp[i]._result)}</div>${t.hasReal?`<div style="font-size:10px;color:${t.aResult>=0?'#3B6D11':'#A32D2D'};font-weight:600">${fmtN(t.aResult)}</div>`:''}</td>`).join('')}</tr>
    </table></div><div style="font-size:10px;color:#888;margin-top:6px">Gris = BP · Bleu = Réel saisi</div>`;
  }

  if(forecastSection==='saisie'){
    html+=`<div class="months-grid">${bp.map((r,idx)=>{
      const hasSaisie=actuel[idx]&&Object.keys(actuel[idx]).length>0;
      return `<button class="month-btn ${hasSaisie?'saisie':''}" onclick="openEditMois(${idx})">${MOIS[r.mi]} ${annee}${hasSaisie?' ✓':''}</button>`;
    }).join('')}</div>`;

    if(editMoisIdx!==null){
      const r=bp[editMoisIdx];
      html+=`<div class="edit-box">
        <div style="font-weight:600;font-size:14px;margin-bottom:4px">Saisie réelle — ${MOIS[r.mi]} ${annee}</div>
        <div style="font-size:12px;color:#888;margin-bottom:14px">Laissez vide pour utiliser la valeur BP (${fmtN(r._ca)}€ CA)</div>
        <div class="section-title">Produits</div>
        <div class="edit-grid">
          ${PRODUITS.map(l=>`<div><label>${l.label}<span style="color:#aaa;font-size:10px"> (BP: ${fmtN(r[l.id])})</span></label><input type="number" value="${editVals[l.id]||''}" oninput="setEditVal('${l.id}',this.value)" placeholder="${r[l.id]}"/></div>`).join('')}
        </div>
        <div class="section-title" style="margin-top:8px">Charges</div>
        <div class="edit-grid">
          ${CHARGES.map(l=>`<div><label>${l.label}<span style="color:#aaa;font-size:10px"> (BP: ${fmtN(r[l.id])})</span></label><input type="number" value="${editVals[l.id]||''}" oninput="setEditVal('${l.id}',this.value)" placeholder="${r[l.id]}"/></div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-primary" onclick="saveMois()">Enregistrer</button>
          <button class="btn" onclick="clearMois()">Effacer ce mois</button>
          <button class="btn" onclick="cancelEdit()">Annuler</button>
        </div>
      </div>`;
    }
  }
  return html;
}

      <div style="font-weight:600;font-size:14px">Documents du projet</div>
      <label class="btn btn-primary" style="cursor:pointer;font-size:12px;padding:6px 14px">

          </div>
        </div>`).join('')
    }
    <div id="upload-progress-${studioId}" style="display:none;margin-top:12px;font-size:12px;color:#5b7fa6">Upload en cours...</div>
  </div>`;
}

async function uploadFichier(studioId, input){
  const files = Array.from(input.files);
  if(!files.length) return;
  const prog = document.getElementById(`upload-progress-${studioId}`);
  if(prog) prog.style.display='block';

  // Charger la liste existante depuis Supabase avant d'ajouter
  const {data:existing} = await sb.from('studios').select('data').eq('id', studioId+'_files').single();
  const currentFiles = existing?.data?.files || STATE.files[studioId] || [];

  for(const file of files){
    const path = `${studioId}/${Date.now()}_${file.name}`;
    const {error} = await sb.storage.from('studio-files').upload(path, file);
    if(!error){
      const {data} = sb.storage.from('studio-files').getPublicUrl(path);
      const size = file.size > 1024*1024 ? (file.size/1024/1024).toFixed(1)+' Mo' : (file.size/1024).toFixed(0)+' Ko';
      const date = new Date().toLocaleDateString('fr-FR');
      currentFiles.push({name:file.name, path, url:data.publicUrl, date, size});
    }
  }

  // Sauvegarder la liste complète
  STATE.files[studioId] = currentFiles;
  await sb.from('studios').upsert({
    id: studioId+'_files',
    data: {files: currentFiles},
    updated_at: new Date().toISOString()
  });

  if(prog) prog.style.display='none';
  toast(`${files.length} fichier(s) ajouté(s)`);
  render();
}

async function deleteFichier(studioId, path){
  if(!confirm('Supprimer ce fichier ?')) return;
  await sb.storage.from('studio-files').remove([path]);
  STATE.files[studioId] = (STATE.files[studioId]||[]).filter(f=>f.path!==path);
  await sb.from('studios').upsert({id:studioId+'_files', data:{files:STATE.files[studioId]}, updated_at:new Date().toISOString()});
  toast('Fichier supprimé');
  render();
}

async function loadFichiers(){
  const {data} = await sb.from('studios').select('id,data').like('id','%_files');
  STATE.files = {};
  if(data) data.forEach(r=>{ const sid=r.id.replace('_files',''); STATE.files[sid]=r.data?.files||[]; });
}

async function archiverStudio(id){
  if(!confirm('Marquer ce studio comme abandonné ?')) return;
  await saveStudio(id,{...STATE.studios[id],statut:'abandonne'});
  toast('Studio archivé');
}

async function restaurerStudio(id){
  const s=STATE.studios[id];
  await saveStudio(id,{...s,statut:inferStatut(s.steps)});
  toast('Studio restauré');
}

async function supprimerStudio(id){
  if(!confirm('Supprimer définitivement ce studio ? Cette action est irréversible.')) return;
  await sb.from('studios').delete().eq('id',id);
  delete STATE.studios[id];
  STATE.view='dashboard';
  STATE.selectedId=null;
  render();
  toast('Studio supprimé');
}

async function toggleStep(studioId, stepId){
  const s=STATE.studios[studioId];
  const newSteps={...s.steps,[stepId]:!s.steps[stepId]};
  await saveStudio(studioId,{...s,steps:newSteps,statut:inferStatut(newSteps)});
  toast('Étape mise à jour');
}

function openEditMois(idx){ STATE.editMoisIdx=idx; STATE.editVals={...(STATE.studios[STATE.selectedId].forecast.actuel[idx]||{})}; render(); }
function setEditVal(k,v){ STATE.editVals[k]=v; }
function cancelEdit(){ STATE.editMoisIdx=null; render(); }

async function saveMois(){
  const s=STATE.studios[STATE.selectedId];
  const newActuel={...s.forecast.actuel,[STATE.editMoisIdx]:{...STATE.editVals}};
  await saveStudio(STATE.selectedId,{...s,forecast:{...s.forecast,actuel:newActuel}});
  STATE.editMoisIdx=null;
  toast('Saisie enregistrée');
}

async function clearMois(){
  const s=STATE.studios[STATE.selectedId];
  const newActuel={...s.forecast.actuel};
  delete newActuel[STATE.editMoisIdx];
  await saveStudio(STATE.selectedId,{...s,forecast:{...s.forecast,actuel:newActuel}});
  STATE.editMoisIdx=null;
  toast('Mois effacé');
}

async function createStudio(){
  const f=STATE.newForm;
  if(!f.name||!f.addr||!f.ouverture){toast('Remplissez tous les champs'); return;}
  const id='proj_'+Date.now();
  const studio={
    name:f.name,addr:f.addr,societe:f.societe||'P&W Occitanie',ouverture:f.ouverture,
    statut:'pipeline',capex:306200,emprunt:214340,
    alertes:['Nouveau projet — démarrer par le test fit local'],
    steps:Object.fromEntries(STEPS.map(s=>[s.id,false])),
    forecast:{annualCA:num(f.annualCA,448800),moisDebut:num(f.moisDebut,0),annee:num(f.annee,2026),actuel:{}},
  };
  await saveStudio(id,studio);
  STATE.showNewForm=false;
  toast('Studio créé');
}

async function askAI(){
  const q=document.getElementById('ai-q')?.value;
  if(!q) return;
  STATE.aiLoading=true; STATE.aiResp=''; render();
  const s=STATE.studios[STATE.selectedId];
  const ctx=`Assistant expert Club Pilates / ISSEO. Studio: ${s.name} (${s.societe}), statut: ${s.statut}, ouverture: ${s.ouverture}. CAPEX: ${fmt(s.capex)}, emprunt: ${fmt(s.emprunt)}. BP annuel CA: ${fmt(s.forecast.annualCA)}. Alertes: ${s.alertes.join(' | ')}. Reponds en francais, concis et operationnel.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:ctx,messages:[{role:'user',content:q}]})});
    const d=await r.json();
    STATE.aiResp=d.content?.[0]?.text||'Pas de reponse.';
  }catch{ STATE.aiResp='Erreur de connexion.'; }
  STATE.aiLoading=false; render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(STATE.view==='auth') root.innerHTML=renderAuth();
  else if(STATE.view==='dashboard') root.innerHTML=renderDashboard();
  else if(STATE.view==='detail') root.innerHTML=renderDetail();
}

// ── Init ──────────────────────────────────────────────────────────────────────
sb.auth.getSession().then(async ({data:{session}})=>{
  if(session){
    STATE.user=session.user;
    const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    STATE.profile=profile;
    await loadStudios();
    await loadFichiers();
    STATE.view='dashboard';
  }
  render();
});
</script>
</body>
</html>
