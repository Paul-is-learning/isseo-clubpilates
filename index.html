function buildBP(annualCA,moisDebut){
  return Array.from({length:12},function(_,i){
    var ca=Math.round(annualCA*RAMP[i]);
    var row={mi:(moisDebut+i)%12,_ca:ca};
    BP_LINES.forEach(function(l){row[l.id]=l.fixed!=null?l.fixed:Math.round(ca*(l.pctCA||0));});
    row._charges=CHARGES.reduce(function(s,l){return s+row[l.id];},0);
    row._result=ca-row._charges;
    row._ebitda=ca-CHARGES_NO_AMORT.reduce(function(s,l){return s+row[l.id];},0);
    return row;
  });
}

function build3YearBP(forecast){
  var md=forecast.moisDebut||0;
  var a1=buildBP(forecast.annualCA||CA_A1,md);
  var a2=buildBP(forecast.annualCA2||(forecast.annualCA?Math.round(forecast.annualCA*1.10):CA_A2),md);
  var a3=buildBP(forecast.annualCA3||(forecast.annualCA?Math.round(forecast.annualCA*1.21):CA_A3),md);
  return {a1:a1,a2:a2,a3:a3};
}

async function loadAll(){
  var res=await sb.from('studios').select('id,data');
  var data=res.data||[];
  var studios={};
  S.files={};S.depenses={};S.messages={};S.adherents={};
  data.forEach(function(r){
    var id=r.id;
    if(id.endsWith('_files')){S.files[id.slice(0,-6)]=r.data&&r.data.files||[];}
    else if(id.endsWith('_depenses')){S.depenses[id.slice(0,-9)]=r.data&&r.data.depenses||[];}

}

  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><span style="font-size:18px;font-weight:600">'+s.name+'</span>'+badge(s.statut)+'</div>';

function renderWorkflow(s){
  var canEdit=S.profile&&(S.profile.role==='admin'||S.profile.role==='tom'||S.profile.role==='pascal');
  var h='<div class="box">'+progBar(s.steps)+'<div style="margin-top:16px">';
  STEPS.forEach(function(step,i){
    var done=s.steps[step.id];
    var unlocked=i===0||s.steps[STEPS[i-1].id];
    var bg=done?'#1D9E75':'transparent';
    var border=done?'#1D9E75':unlocked?'#aaa':'#ddd';
    var cursor=unlocked&&canEdit?'pointer':'default';
    var click=unlocked&&canEdit?'onclick="toggleStep(\''+S.selectedId+'\',\''+step.id+'\')">':'>';
    h+='<div style="display:flex;gap:12px;margin-bottom:10px;opacity:'+((!done&&!unlocked)?0.4:1)+'">';
    h+='<div style="display:flex;flex-direction:column;align-items:center">';
    h+='<div class="step-dot" style="background:'+bg+';border:2px solid '+border+';color:'+(done?'#fff':'#aaa')+';cursor:'+cursor+'" '+click+(done?'&#10003;':'')+'</div>';
    if(i<STEPS.length-1)h+='<div style="width:2px;flex:1;min-height:14px;background:'+(done?'#1D9E75':'#e0e0d8')+';margin-top:2px"></div>';
    h+='</div><div style="padding-bottom:8px"><div style="font-size:13px;font-weight:'+(done?600:400)+'">'+step.label+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+step.desc+'</div></div></div>';
  });
  return h+'</div></div>';
}

// ── Adherents ─────────────────────────────────────────────────────────────────
function renderAdherents(sid,s){
  var ay=S.adherentYear||1;
  var actuel=S.adherents[sid]||{};
  var moisDebut=s.forecast&&s.forecast.moisDebut||0;
  var annee=(s.forecast&&s.forecast.annee||2026)+(ay-1);
  var offset=(ay-1)*12;
  var bpArr=[],churnArr=[];
  for(var i=0;i<12;i++){
    var idx=offset+i;
    bpArr.push(idx<BP_ADHERENTS.length?BP_ADHERENTS[idx]:400);
    churnArr.push(idx<BP_CHURN.length?BP_CHURN[idx]:0);
  }
  var realArr=[];
  for(var i=0;i<12;i++){
    var key='y'+ay+'_m'+i;
    realArr.push(actuel[key]!=null?num(actuel[key]):null);
  }
  var lastReal=null;
  var nbReal=0;
  for(var i=0;i<realArr.length;i++){if(realArr[i]!==null){lastReal=realArr[i];nbReal=i+1;}}
  var bpCible=bpArr[11];
  var ecart=lastReal!==null&&nbReal>0?Math.round(lastReal-bpArr[nbReal-1]):null;
  var moisLabels=[];
  for(var i=0;i<12;i++){moisLabels.push(MOIS[(moisDebut+i)%12]);}

  var h='<div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:16px">';
  [1,2,3].forEach(function(y){
    h+='<button class="yr-tab '+(ay===y?'active':'')+'" onclick="setAdherentYear('+y+')">Annee '+y+' ('+((s.forecast&&s.forecast.annee||2026)+(y-1))+')</button>';
  });
  h+='</div>';
  h+='<div class="kpis" style="margin-bottom:16px">';
  h+='<div class="kpi"><div class="kpi-label">Cible BP fin A'+ay+'</div><div class="kpi-val">'+bpCible+' mbr</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Membres reels</div><div class="kpi-val" style="color:#185FA5">'+(lastReal!==null?lastReal+'':'--')+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Ecart vs BP</div><div class="kpi-val" style="color:'+(ecart!==null?(ecart>=0?'#3B6D11':'#A32D2D'):'#888')+'">'+(ecart!==null?(ecart>=0?'+':'')+ecart:'--')+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Seuil rentabilite</div><div class="kpi-val">150-200</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Pack4/Pack8/Illim.</div><div class="kpi-val" style="font-size:11px">47% / 50% / 3%</div></div>';
  h+='</div>';
  h+=renderAdherentChart(moisLabels,bpArr,realArr,annee);
  h+='<div class="box" style="background:#f5f5f0;margin-bottom:12px">';
  h+='<div style="font-weight:600;font-size:12px;margin-bottom:8px;color:#555">Churn mensuel BP (source Plan Financier)</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
  for(var i=0;i<12;i++){
    var c=churnArr[i];
    h+='<div style="text-align:center;min-width:44px;background:#fff;border-radius:6px;padding:4px 6px">';
    h+='<div style="font-size:10px;color:#888">'+moisLabels[i]+'</div>';
    h+='<div style="font-size:12px;font-weight:600;color:'+(c<0?'#A32D2D':'#888')+'">'+c+'</div></div>';
  }
  h+='</div></div>';
  h+='<div class="box">';
  h+='<div style="font-weight:600;font-size:14px;margin-bottom:12px">Saisie mensuelle &mdash; Annee '+ay+' ('+annee+')</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px">';
  for(var i=0;i<12;i++){
    var key='y'+ay+'_m'+i;
    var rVal=actuel[key]!=null?actuel[key]:'';
    var bp=bpArr[i];
    var diff=rVal!==''?num(rVal)-bp:null;
    var diffColor=diff!==null?(diff>=0?'#3B6D11':'#A32D2D'):'#888';
    h+='<div style="background:#f5f5f0;border-radius:8px;padding:8px">';
    h+='<div style="font-size:11px;font-weight:600;margin-bottom:2px">'+moisLabels[i]+'</div>';
    h+='<div style="font-size:10px;color:#888;margin-bottom:3px">BP: '+bp+' (churn '+churnArr[i]+')</div>';
    h+='<input type="number" value="'+rVal+'" placeholder="--" onchange="saisirAdherent(\''+sid+'\','+ay+','+i+',this.value)" style="width:100%;padding:5px 7px;border:0.5px solid #ddd;border-radius:6px;font-size:12px;outline:none;background:#fff"/>';
    if(diff!==null)h+='<div style="font-size:10px;color:'+diffColor+';margin-top:3px;font-weight:600">'+(diff>=0?'+':'')+diff+'</div>';
    h+='</div>';
  }
  h+='</div></div></div>';
  return h;
}

function renderAdherentChart(labels,bp,real,annee){
  var W=680,H=240,PL=44,PR=20,PT=20,PB=30;
  var cW=W-PL-PR,cH=H-PT-PB;
  var allVals=bp.concat(real.filter(function(v){return v!==null;}));
  var maxV=Math.max.apply(null,allVals)*1.12;
  function xPos(i){return PL+i*(cW/(labels.length-1));}
  function yPos(v){return PT+cH-(v/maxV)*cH;}
  var h='<div class="box" style="margin-bottom:12px;padding:1rem">';
  h+='<div style="font-weight:600;font-size:13px;margin-bottom:12px">Evolution adherents &mdash; '+annee+' &nbsp; BP vs Realise</div>';
  h+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">';
  for(var g=0;g<=5;g++){
    var gv=Math.round(maxV*g/5);
    var gy=yPos(gv);
    h+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#e8e8e0" stroke-width="1"/>';
    h+='<text x="'+(PL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#aaa">'+gv+'</text>';
  }
  var yR150=yPos(150),yR200=yPos(200);
  h+='<rect x="'+PL+'" y="'+yR200+'" width="'+cW+'" height="'+(yR150-yR200)+'" fill="#E1F5EE" opacity="0.5"/>';
  h+='<text x="'+(PL+4)+'" y="'+(yR200-3)+'" font-size="8" fill="#0F6E56">Seuil 150-200</text>';
  labels.forEach(function(l,i){h+='<text x="'+xPos(i)+'" y="'+(H-5)+'" text-anchor="middle" font-size="9" fill="#888">'+l+'</text>';});
  var bpPath='M';
  bp.forEach(function(v,i){bpPath+=(i>0?' L':'')+xPos(i)+' '+yPos(v);});
  h+='<path d="'+bpPath+'" fill="none" stroke="#5b7fa6" stroke-width="2" stroke-dasharray="6,3"/>';
  var realPoints=[];
  real.forEach(function(v,i){if(v!==null)realPoints.push({x:xPos(i),y:yPos(v),v:v});});
  if(realPoints.length>1){
    var rPath='M';
    realPoints.forEach(function(p,i){rPath+=(i>0?' L':'')+p.x+' '+p.y;});
    h+='<path d="'+rPath+'" fill="none" stroke="#1D9E75" stroke-width="2.5"/>';
  }
  bp.forEach(function(v,i){h+='<circle cx="'+xPos(i)+'" cy="'+yPos(v)+'" r="3" fill="#5b7fa6" opacity="0.6"/>';});
  realPoints.forEach(function(p){
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#1D9E75"/>';
    h+='<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="#0F6E56" font-weight="600">'+p.v+'</text>';
  });
  h+='<line x1="'+(W-130)+'" y1="14" x2="'+(W-110)+'" y2="14" stroke="#5b7fa6" stroke-width="2" stroke-dasharray="6,3"/>';
  h+='<text x="'+(W-106)+'" y="17" font-size="9" fill="#5b7fa6">BP Plan Fin.</text>';
  h+='<line x1="'+(W-130)+'" y1="27" x2="'+(W-110)+'" y2="27" stroke="#1D9E75" stroke-width="2.5"/>';
  h+='<text x="'+(W-106)+'" y="30" font-size="9" fill="#1D9E75">Realise</text>';
  h+='</svg></div>';
  return h;
}

// ── Forecast ──────────────────────────────────────────────────────────────────
function renderForecast(sid,s){
  var fy=S.forecastYear||1;
  var fs=S.forecastSection||'summary';
  var fc=s.forecast||{};
  var bps=build3YearBP(fc);
  var bp=fy===1?bps.a1:fy===2?bps.a2:bps.a3;
  var actuelKey=fy===1?'actuel':fy===2?'actuel2':'actuel3';
  var actuel=fc[actuelKey]||{};
  var annee=(fc.annee||2026)+(fy-1);
  var moisDebut=fc.moisDebut||0;
  var annualCA=fy===1?(fc.annualCA||CA_A1):fy===2?(fc.annualCA2||CA_A2):(fc.annualCA3||CA_A3);

  var totals=bp.map(function(r,idx){
    var a=actuel[idx]||{};
    var hasReal=Object.keys(a).length>0;
    var aCA=hasReal?num(a.ca_cours)+num(a.ca_prives)+num(a.ca_boutique):null;
    var aCharges=hasReal?CHARGES.reduce(function(sum,l){return sum+num(a[l.id]!=null?a[l.id]:r[l.id]);},0):null;
    var aEBITDA=hasReal?(aCA-CHARGES_NO_AMORT.reduce(function(sum,l){return sum+num(a[l.id]!=null?a[l.id]:r[l.id]);},0)):null;
    return{bpCA:r._ca,bpCharges:r._charges,bpResult:r._result,bpEBITDA:r._ebitda,
      aCA:aCA,aCharges:aCharges,aResult:hasReal?aCA-aCharges:null,aEBITDA:aEBITDA,hasReal:hasReal};
  });

  var rm=totals.filter(function(t){return t.hasReal;});
  var cumBPCA=totals.reduce(function(s,t){return s+t.bpCA;},0);
  var cumActCA=rm.reduce(function(s,t){return s+t.aCA;},0);
  var cumBPRes=totals.reduce(function(s,t){return s+t.bpResult;},0);
  var cumActRes=rm.reduce(function(s,t){return s+t.aResult;},0);
  var cumBPEBITDA=totals.reduce(function(s,t){return s+t.bpEBITDA;},0);
  var cumActEBITDA=rm.reduce(function(s,t){return s+t.aEBITDA;},0);
  var refCA=rm.reduce(function(s,t){return s+t.bpCA;},0);
  var ecartCA=refCA?Math.round((cumActCA/refCA-1)*100):0;
  var moisLabels=[];
  for(var i=0;i<12;i++){moisLabels.push(MOIS[(moisDebut+i)%12]);}

  var h='<div>';
  // Selecteur annee avec CA
  h+='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  [1,2,3].forEach(function(y){
    var yCA=y===1?(fc.annualCA||CA_A1):y===2?(fc.annualCA2||CA_A2):(fc.annualCA3||CA_A3);
    h+='<button class="yr-tab '+(fy===y?'active':'')+'" onclick="setForecastYear('+y+')">A'+y+' ('+(( fc.annee||2026)+(y-1))+') &mdash; '+fmt(yCA)+'</button>';
  });
  h+='</div>';

  h+='<div class="kpis" style="margin-bottom:16px">';
  h+='<div class="kpi"><div class="kpi-label">CA BP annuel</div><div class="kpi-val">'+fmt(annualCA)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">CA reel cumule</div><div class="kpi-val" style="color:#185FA5">'+fmt(cumActCA)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Ecart CA</div><div class="kpi-val" style="color:'+(ecartCA>=0?'#3B6D11':'#A32D2D')+'">'+(ecartCA>=0?'+':'')+ecartCA+'%</div></div>';
  h+='<div class="kpi"><div class="kpi-label">EBITDA BP</div><div class="kpi-val" style="color:#0F6E56">'+fmt(cumBPEBITDA)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">EBITDA reel</div><div class="kpi-val" style="color:'+(cumActEBITDA>=0?'#0F6E56':'#A32D2D')+'">'+fmt(cumActEBITDA)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Resultat BP</div><div class="kpi-val">'+fmt(cumBPRes)+'</div></div>';
  h+='</div>';

  h+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';
  h+='<button class="tab '+(fs==='summary'?'active':'')+'" onclick="setFS(\'summary\')">Synthese</button>';
  h+='<button class="tab '+(fs==='detail'?'active':'')+'" onclick="setFS(\'detail\')">Detail complet</button>';
  h+='<button class="tab '+(fs==='saisie'?'active':'')+'" onclick="setFS(\'saisie\')">Saisie mensuelle</button>';
  h+='<button class="tab '+(fs==='recap3'?'active':'')+'" onclick="setFS(\'recap3\')">Recap 3 ans</button>';
  h+='</div>';

  if(fs==='summary'){
    var rows=[
      {l:'CA BP',vals:totals.map(function(t){return t.bpCA;}),tot:cumBPCA,bold:true},
      {l:'CA Reel',vals:totals.map(function(t){return t.aCA;}),tot:cumActCA,blue:true},
      {l:'EBITDA BP',vals:totals.map(function(t){return t.bpEBITDA;}),tot:cumBPEBITDA,bold:true,green:true},
      {l:'EBITDA Reel',vals:totals.map(function(t){return t.aEBITDA;}),tot:cumActEBITDA,blue:true,res:true},
      {l:'Charges BP',vals:totals.map(function(t){return t.bpCharges;}),tot:totals.reduce(function(s,t){return s+t.bpCharges;},0)},
      {l:'Resultat BP',vals:totals.map(function(t){return t.bpResult;}),tot:cumBPRes,bold:true},
      {l:'Resultat Reel',vals:totals.map(function(t){return t.aResult;}),tot:cumActRes,blue:true,res:true},
    ];
    h+='<div style="overflow-x:auto"><table>';
    h+='<tr><th style="text-align:left;padding-left:8px">Ligne</th>';
    moisLabels.forEach(function(m){h+='<th>'+m+'</th>';});
    h+='<th>Total</th></tr>';
    rows.forEach(function(row){
      h+='<tr style="background:'+(row.green?'#f0faf5':row.bold?'#f5f5f0':'')+'">';
      h+='<td class="lbl" style="font-weight:'+(row.bold||row.green?600:400)+';color:'+(row.green?'#0F6E56':'inherit')+'">'+row.l+'</td>';
      row.vals.forEach(function(v){
        var c='inherit';
        if(row.green&&v!==null)c='#0F6E56';
        else if(row.blue&&v!==null)c=row.res?(v>=0?'#3B6D11':'#A32D2D'):'#185FA5';
        h+='<td style="color:'+c+'">'+(v===null?'<span style="color:#ddd">--</span>':fmtN(v))+'</td>';
      });
      var totColor=row.green?'#0F6E56':row.res?(row.tot>=0?'#3B6D11':'#A32D2D'):'inherit';
      h+='<td style="font-weight:700;color:'+totColor+'">'+fmtN(row.tot)+'</td></tr>';
    });
    h+='</table></div>';
    h+='<div style="font-size:10px;color:#888;margin-top:6px">Noir/gris = BP &middot; Bleu = Reel saisi &middot; Vert = EBITDA</div>';
  }

  if(fs==='detail'){
    h+='<div style="overflow-x:auto"><table>';
    h+='<tr><th style="text-align:left;padding-left:8px;min-width:150px">Ligne</th>';
    moisLabels.forEach(function(m){h+='<th>'+m+'</th>';});
    h+='<th style="font-weight:700">Total</th></tr>';
    // Produits
    h+='<tr style="background:#e8f0f8"><td class="lbl" colspan="14" style="font-weight:700;color:#185FA5;padding:6px 8px">PRODUITS</td></tr>';
    PRODUITS.forEach(function(l){
      var tot=0;
      h+='<tr><td class="lbl" style="padding-left:16px">'+l.label+'</td>';
      bp.forEach(function(r,i){
        var bv=r[l.id];tot+=bv;
        var a=actuel[i]&&actuel[i][l.id]!=null?actuel[i][l.id]:null;
        h+='<td><div style="font-size:10px;color:#444">'+fmtN(bv)+'</div>'+(a!==null?'<div style="font-size:10px;color:#185FA5;font-weight:600">'+fmtN(a)+'</div>':'')+'</td>';
      });
      h+='<td style="font-weight:600;font-size:10px">'+fmtN(tot)+'</td></tr>';
    });
    // EBITDA
    h+='<tr style="background:#f0faf5"><td class="lbl" colspan="14" style="font-weight:700;color:#0F6E56;padding:6px 8px">EBITDA</td></tr>';
    h+='<tr style="background:#f0faf5"><td class="lbl" style="padding-left:16px;font-weight:600;color:#0F6E56">EBITDA mensuel</td>';
    var totEB=0;
    totals.forEach(function(t){
      totEB+=t.bpEBITDA;
      h+='<td><div style="font-size:10px;font-weight:600;color:#0F6E56">'+fmtN(t.bpEBITDA)+'</div>';
      if(t.hasReal)h+='<div style="font-size:10px;color:'+(t.aEBITDA>=0?'#3B6D11':'#A32D2D')+';font-weight:600">'+fmtN(t.aEBITDA)+'</div>';

    var sCA1=sumF(a1s,'_ca'),sCA2=sumF(a2s,'_ca'),sCA3=sumF(a3s,'_ca');
    var sEB1=sumF(a1s,'_ebitda'),sEB2=sumF(a2s,'_ebitda'),sEB3=sumF(a3s,'_ebitda');
    var sRN1=sumF(a1s,'_result'),sRN2=sumF(a2s,'_result'),sRN3=sumF(a3s,'_result');

    });
    h+='</table></div></div>';
    // Graphique CA 3 ans
    h+=renderCA3Chart(a1s,a2s,a3s,fc);

  h+='</div>';
  return h;

function renderCA3Chart(a1s,a2s,a3s,fc){
  var all=[].concat(a1s,a2s,a3s).map(function(r){return r._ca;});
  var allEB=[].concat(a1s,a2s,a3s).map(function(r){return r._ebitda;});
  var W=680,H=180,PL=52,PR=10,PT=16,PB=26;
  var cW=W-PL-PR,cH=H-PT-PB;
  var maxV=Math.max.apply(null,all)*1.1;
  function xp(i){return PL+i*(cW/(all.length-1));}
  function yp(v){return PT+cH-(v/maxV)*cH;}
  var colors=['#5b7fa6','#1D9E75','#854F0B'];
  var years=[a1s,a2s,a3s];
  var h='<div class="box"><div style="font-weight:600;font-size:13px;margin-bottom:10px">CA mensuel BP &mdash; 3 ans compares</div>';
  h+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">';
  for(var g=0;g<=4;g++){
    var gv=Math.round(maxV*g/4);
    var gy=yp(gv);
    h+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#e8e8e0" stroke-width="1"/>';
    h+='<text x="'+(PL-4)+'" y="'+(gy+4)+'" text-anchor="end" font-size="8" fill="#aaa">'+fmt(gv)+'</text>';
  }
  var off=0;
  years.forEach(function(ys,yi){
    var path='M';
    ys.forEach(function(r,i){path+=(i>0?' L':'')+xp(off+i)+' '+yp(r._ca);});
    h+='<path d="'+path+'" fill="none" stroke="'+colors[yi]+'" stroke-width="2"/>';
    // EBITDA area
    var eb='M'+xp(off)+' '+yp(0);
    ys.forEach(function(r,i){eb+=' L'+xp(off+i)+' '+yp(r._ebitda);});
    eb+=' L'+xp(off+11)+' '+yp(0)+' Z';
    h+='<path d="'+eb+'" fill="'+colors[yi]+'" opacity="0.08"/>';
    ys.forEach(function(r,i){h+='<circle cx="'+xp(off+i)+'" cy="'+yp(r._ca)+'" r="2.5" fill="'+colors[yi]+'"/>';});
    off+=12;
  });
  h+='<line x1="'+xp(12)+'" y1="'+PT+'" x2="'+xp(12)+'" y2="'+(H-PB)+'" stroke="#ddd" stroke-dasharray="4,2"/>';
  h+='<line x1="'+xp(24)+'" y1="'+PT+'" x2="'+xp(24)+'" y2="'+(H-PB)+'" stroke="#ddd" stroke-dasharray="4,2"/>';
  var lblY=H-PB+14;
  h+='<text x="'+xp(6)+'" y="'+lblY+'" text-anchor="middle" font-size="9" fill="'+colors[0]+'">A1 ('+(fc.annee||2026)+')</text>';
  h+='<text x="'+xp(18)+'" y="'+lblY+'" text-anchor="middle" font-size="9" fill="'+colors[1]+'">A2 ('+(fc.annee?fc.annee+1:2027)+')</text>';
  h+='<text x="'+xp(30)+'" y="'+lblY+'" text-anchor="middle" font-size="9" fill="'+colors[2]+'">A3 ('+(fc.annee?fc.annee+2:2028)+')</text>';
  // Legende
  h+='<rect x="'+(W-100)+'" y="8" width="8" height="8" fill="'+colors[0]+'" opacity="0.3"/>';
  h+='<text x="'+(W-88)+'" y="15" font-size="8" fill="#888">Zone EBITDA</text>';
  h+='</svg></div>';
  return h;
}

function calcTTC(){
  var ht=num(document.getElementById('dep-ht')&&document.getElementById('dep-ht').value);
  var tva=num(document.getElementById('dep-tva')&&document.getElementById('dep-tva').value,20);
  var el=document.getElementById('dep-ttc');
  if(el)el.value=Math.round(ht*(1+tva/100));
}

async function sauvegarderDepense(sid){
  var cat=document.getElementById('dep-cat')&&document.getElementById('dep-cat').value;
  if(!cat){toast('Selectionnez une categorie');return;}
  if(!S.depenses[sid])S.depenses[sid]=[];
  S.depenses[sid].push({
    categorie:cat,
    description:(document.getElementById('dep-desc')&&document.getElementById('dep-desc').value)||'',
    ht:num(document.getElementById('dep-ht')&&document.getElementById('dep-ht').value),
    tva:num(document.getElementById('dep-tva')&&document.getElementById('dep-tva').value,20),
    ttc:num(document.getElementById('dep-ttc')&&document.getElementById('dep-ttc').value),
    financement:(document.getElementById('dep-fin')&&document.getElementById('dep-fin').value)||'Emprunt bancaire',
    engage_par:(document.getElementById('dep-par')&&document.getElementById('dep-par').value)||'',
    date:(document.getElementById('dep-date')&&document.getElementById('dep-date').value)||'',
    deblocage:'attente',fichierUrl:null,fichierPath:null,date_demande:null,date_deblocage:null,
  });
  await saveDepenses(sid);
  toast('Depense enregistree');render();
}

async function supprimerDepense(sid,idx){
  if(!confirm('Supprimer ?'))return;
  S.depenses[sid].splice(idx,1);
  await saveDepenses(sid);render();
}

async function changerDeblocage(sid,idx){
  var d=S.depenses[sid][idx];
  var today=new Date().toLocaleDateString('fr-FR');
  if(d.deblocage==='attente'){d.deblocage='demande';d.date_demande=today;}
  else if(d.deblocage==='demande'){d.deblocage='debloque';d.date_deblocage=today;}
  else{d.deblocage='attente';d.date_demande=null;d.date_deblocage=null;}
  await saveDepenses(sid);render();
}

async function uploadJustif(sid,idx,input){
  var file=input.files[0];if(!file)return;
  var path=sid+'/justif_'+Date.now()+'_'+cleanName(file.name);
  var res=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
  if(res.error){toast('Erreur upload');return;}
  var pu=sb.storage.from('studio-files').getPublicUrl(path);
  S.depenses[sid][idx].fichierUrl=pu.data.publicUrl;
  S.depenses[sid][idx].fichierPath=path;
  await saveDepenses(sid);render();
}

      h+='<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+';max-width:72%">';
      h+='<div style="font-size:11px;color:#888;margin-bottom:3px;font-weight:500">'+m.auteur+' &mdash; '+m.date+'</div>';
      h+='<div style="background:'+(isMe?'#1a1a1a':'#f0f0ea')+';color:'+(isMe?'#fff':'#1a1a1a')+';padding:10px 14px;border-radius:'+(isMe?'12px 12px 2px 12px':'12px 12px 12px 2px')+';font-size:13px;line-height:1.5">'+m.texte+'</div>';
      h+='</div></div>';
    });
  }
  h+='</div>';
  h+='<div style="border-top:0.5px solid #e0e0d8;padding:12px 16px;display:flex;gap:8px;background:#fff">';
  h+='<input id="msg-input" type="text" placeholder="Votre message..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();envoyerMessage(\''+sid+'\');}" style="flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none"/>';
  h+='<button class="btn btn-primary" onclick="envoyerMessage(\''+sid+'\')">Envoyer</button>';
  h+='</div></div></div>';
  setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
  return h;
}

async function envoyerMessage(sid){
  var input=document.getElementById('msg-input');
  var texte=input&&input.value&&input.value.trim();
  if(!texte)return;
  if(!S.messages[sid])S.messages[sid]=[];
  var now=new Date();
  S.messages[sid].push({
    auteur:(S.profile&&S.profile.nom)||'',
    texte:texte,
    date:now.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.toISOString(),
  });
  await sb.from('studios').upsert({id:sid+'_messages',data:{messages:S.messages[sid]},updated_at:new Date().toISOString()});
  render();
  setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
}

function renderLocalisation(s){
  var ae=encodeURIComponent(s.addr);
  var sm='https://staticmap.openstreetmap.de/staticmap.php?center='+ae+'&zoom=16&size=640x360&markers='+ae+',red-pushpin';
  return '<div><div class="box" style="padding:0;overflow:hidden;margin-bottom:12px"><img src="'+sm+'" style="width:100%;height:360px;object-fit:cover;display:block" onerror="this.outerHTML=\'<div style=padding:3rem;text-align:center;color:#aaa;font-size:13px>Apercu non disponible</div>\'" alt="Carte"/></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'
    +'<a href="https://www.google.com/maps/search/'+ae+'" target="_blank" style="text-decoration:none"><div class="box" style="display:flex;align-items:center;gap:12px;margin-bottom:0"><span style="font-size:20px">&#128205;</span><div><div style="font-weight:600;font-size:13px;color:#1a1a1a">Google Maps</div><div style="font-size:11px;color:#888">Street View et satellite</div></div></div></a>'
    +'<a href="https://www.openstreetmap.org/search?query='+ae+'" target="_blank" style="text-decoration:none"><div class="box" style="display:flex;align-items:center;gap:12px;margin-bottom:0"><span style="font-size:20px">&#128506;</span><div><div style="font-weight:600;font-size:13px;color:#1a1a1a">OpenStreetMap</div><div style="font-size:11px;color:#888">Carte interactive</div></div></div></a>'
    +'</div><div class="box" style="background:#f5f5f0"><div style="font-size:11px;color:#888;margin-bottom:4px">Adresse</div><div style="font-size:14px;font-weight:500">'+s.addr+'</div></div></div>';
}

function renderFichiers(sid){
  var files=S.files[sid]||[];
  var h='<div class="box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h+='<span style="font-weight:600;font-size:14px">Documents ('+files.length+')</span>';
  h+='<label class="btn btn-primary" style="cursor:pointer;font-size:12px">+ Ajouter<input type="file" style="display:none" onchange="uploadFichier(\''+sid+'\',this)" multiple/></label>';
  h+='</div><div id="uprog-'+sid+'" style="display:none;font-size:12px;color:#5b7fa6;margin-bottom:10px">Upload en cours...</div>';
  if(files.length===0){h+='<div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">Aucun document</div>';}
  else{
    files.forEach(function(f){
      h+='<div class="file-row"><div style="display:flex;align-items:center;gap:10px">';
      h+='<span style="font-size:12px;background:#f0f0ea;padding:4px 8px;border-radius:6px">'+f.name.split('.').pop().toUpperCase()+'</span>';
      h+='<div><div style="font-size:13px;font-weight:500">'+f.name+'</div><div style="font-size:11px;color:#888">'+f.date+' &mdash; '+f.size+'</div></div></div>';
      h+='<div style="display:flex;gap:8px"><a href="'+f.url+'" target="_blank" class="btn" style="font-size:12px;text-decoration:none">Ouvrir</a>';
      h+='<button class="btn" style="font-size:12px;color:#A32D2D" onclick="deleteFichier(\''+sid+'\',\''+f.path+'\')">&#10005;</button></div></div>';
    });
  }
  h+='</div>';
  return h;
}

function renderAI(s){
  var ctx='Studio Club Pilates: '+s.name+', societe: '+s.societe+', statut: '+s.statut+'. ';
  ctx+='BP adherents: 285 fin A1, 345 fin A2, 400 fin A3. ';
  ctx+='Repartition: Pack4 47% a 110 HT, Pack8 50% a 193.33 HT, Illimite 3% a 276.67 HT. ';
  ctx+='CA BP: A1='+fmt(s.forecast&&s.forecast.annualCA||CA_A1)+', A2='+fmt(s.forecast&&s.forecast.annualCA2||CA_A2)+', A3='+fmt(s.forecast&&s.forecast.annualCA3||CA_A3)+'.';
  return '<div class="box"><div style="font-weight:600;font-size:14px;margin-bottom:4px">Analyste IA &mdash; '+s.name+'</div>'
    +'<div style="font-size:11px;color:#888;margin-bottom:12px">Questions sur ce studio : performances, seuil de rentabilite, scenarios...</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px"><input id="aiq" type="text" placeholder="Ex: Quand atteindre le seuil de rentabilite ?" onkeydown="if(event.key===\'Enter\')askAI()" style="flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none"/>'
    +'<button class="btn btn-primary" onclick="askAI()" '+(S.aiLoading?'disabled':'')+'>'+( S.aiLoading?'...':'Analyser')+'</button></div>'
    +(S.aiResp?'<div style="font-size:13px;line-height:1.6;background:#f5f5f0;border-radius:8px;padding:10px 14px;white-space:pre-wrap">'+S.aiResp+'</div>':'')
    +'</div>';
}

function renderNewForm(){
  var f=S.newForm;
  var h='<div class="box"><div style="font-weight:600;font-size:15px;margin-bottom:14px">Nouveau studio</div><div class="form-grid">';
  h+='<div class="fg"><label>Nom</label><input value="'+(f.name||'')+'" oninput="setNF(\'name\',this.value)" placeholder="Ex: Paris 16e"/></div>';
  h+='<div class="fg"><label>Adresse</label><input value="'+(f.addr||'')+'" oninput="setNF(\'addr\',this.value)" placeholder="Rue, CP Ville"/></div>';
  h+='<div class="fg"><label>Societe</label><select onchange="setNF(\'societe\',this.value)"><option>P&amp;W Occitanie</option><option>COBE Society</option><option>SACOBE Society</option></select></div>';
  h+='<div class="fg"><label>Ouverture</label><input value="'+(f.ouverture||'')+'" oninput="setNF(\'ouverture\',this.value)" placeholder="Ex: T2 2027"/></div>';
  h+='<div class="fg"><label>CA annuel A1</label><input type="number" value="'+(f.annualCA||CA_A1)+'" oninput="setNF(\'annualCA\',this.value)"/></div>';
  h+='<div class="fg"><label>Mois ouverture</label><select onchange="setNF(\'moisDebut\',this.value)">';
  MOIS.forEach(function(m,i){h+='<option value="'+i+'" '+((f.moisDebut||0)==i?'selected':'')+'>'+m+'</option>';});
  h+='</select></div></div>';
  h+='<div class="info-box">CA A2 et A3 calcules automatiquement sur base A1 (+10% / +21%). Repartition et churn BP issus du Plan Financier CP.</div>';
  h+='<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="createStudio()">Creer</button><button class="btn" onclick="toggleNewForm()">Annuler</button></div></div>';
  return h;
}

async function doLogin(){
  var email=document.getElementById('ae').value;
  var pwd=document.getElementById('ap').value;
  var err=document.getElementById('aerr');
  var res=await sb.auth.signInWithPassword({email:email,password:pwd});
  if(res.error){err.style.display='block';err.textContent=res.error.message;return;}
  S.user=res.data.user;
  var prof=await sb.from('profiles').select('*').eq('id',res.data.user.id).single();
  S.profile=prof.data;
  await loadAll();
  S.view='dashboard';render();
}
async function doLogout(){await sb.auth.signOut();S.user=null;S.profile=null;S.view='auth';S.selectedId=null;render();}
function openDetail(id){S.view='detail';S.selectedId=id;S.detailTab='workflow';S.aiResp='';S.forecastYear=1;S.forecastSection='summary';S.adherentYear=1;render();}
function goBack(){S.view='dashboard';S.selectedId=null;render();}
function setMainTab(t){S.mainTab=t;render();}
function setDetailTab(t){S.detailTab=t;S.aiResp='';S.editMoisIdx=null;render();}
function setFS(s){S.forecastSection=s;S.editMoisIdx=null;render();}
function setForecastYear(y){S.forecastYear=y;S.editMoisIdx=null;render();}
function setAdherentYear(y){S.adherentYear=y;render();}
function toggleNewForm(){S.showNewForm=!S.showNewForm;S.newForm={societe:'P&W Occitanie',annualCA:CA_A1,moisDebut:0,annee:2026};render();}
function setNF(k,v){S.newForm[k]=v;}
function setEV(k,v){S.editVals[k]=v;}
function openEditMois(idx){
  S.editMoisIdx=idx;
  var fc=S.studios[S.selectedId].forecast;
  var ak=S.forecastYear===1?'actuel':S.forecastYear===2?'actuel2':'actuel3';
  S.editVals=Object.assign({},fc[ak]&&fc[ak][idx]||{});
  render();
}
function cancelEdit(){S.editMoisIdx=null;render();}

async function toggleStep(sid,stepId){
  var s=S.studios[sid];
  var ns=Object.assign({},s.steps);
  ns[stepId]=!s.steps[stepId];
  await saveStudio(sid,Object.assign({},s,{steps:ns,statut:inferStatut(ns)}));
  toast('Etape mise a jour');
}

async function saveMois(){
  var s=S.studios[S.selectedId];
  var fc=s.forecast;
  var ak=S.forecastYear===1?'actuel':S.forecastYear===2?'actuel2':'actuel3';
  var newAk=Object.assign({},fc[ak]||{});
  newAk[S.editMoisIdx]=Object.assign({},S.editVals);
  var newFc=Object.assign({},fc);newFc[ak]=newAk;
  await saveStudio(S.selectedId,Object.assign({},s,{forecast:newFc}));
  S.editMoisIdx=null;toast('Saisie enregistree');
}

async function clearMois(){
  var s=S.studios[S.selectedId];
  var fc=s.forecast;
  var ak=S.forecastYear===1?'actuel':S.forecastYear===2?'actuel2':'actuel3';
  var newAk=Object.assign({},fc[ak]||{});
  delete newAk[S.editMoisIdx];
  var newFc=Object.assign({},fc);newFc[ak]=newAk;
  await saveStudio(S.selectedId,Object.assign({},s,{forecast:newFc}));
  S.editMoisIdx=null;toast('Mois efface');
}

async function saisirAdherent(sid,year,moisIdx,val){
  if(!S.adherents[sid])S.adherents[sid]={};
  var key='y'+year+'_m'+moisIdx;
  if(val===''||val===null){delete S.adherents[sid][key];}
  else{S.adherents[sid][key]=num(val);}
  await saveAdherents(sid);
}

async function uploadFichier(sid,input){
  var files=Array.from(input.files);if(!files.length)return;
  var prog=document.getElementById('uprog-'+sid);if(prog)prog.style.display='block';
  var ex=await sb.from('studios').select('data').eq('id',sid+'_files').maybeSingle();
  var cur=(ex.data&&ex.data.data&&ex.data.data.files)||S.files[sid]||[];
  cur=cur.slice();var added=0;
  for(var i=0;i<files.length;i++){
    var file=files[i];
    var path=sid+'/'+Date.now()+'_'+cleanName(file.name);
    var ur=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
    if(!ur.error){
      var pu=sb.storage.from('studio-files').getPublicUrl(path);
      var size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' Mo':(file.size/1024).toFixed(0)+' Ko';
      cur.push({name:file.name,path:path,url:pu.data.publicUrl,date:new Date().toLocaleDateString('fr-FR'),size:size});
      added++;
    }
  }
  await sb.from('studios').upsert({id:sid+'_files',data:{files:cur},updated_at:new Date().toISOString()});
  S.files[sid]=cur;if(prog)prog.style.display='none';
  toast(added+' fichier(s) ajoute(s)');render();
}

async function deleteFichier(sid,path){
  if(!confirm('Supprimer ?'))return;
  await sb.storage.from('studio-files').remove([path]);
  S.files[sid]=(S.files[sid]||[]).filter(function(f){return f.path!==path;});
  await sb.from('studios').upsert({id:sid+'_files',data:{files:S.files[sid]},updated_at:new Date().toISOString()});
  toast('Supprime');render();
}

async function archiverStudio(id){if(!confirm('Archiver ?'))return;await saveStudio(id,Object.assign({},S.studios[id],{statut:'abandonne'}));toast('Archive');}
async function restaurerStudio(id){var s=S.studios[id];await saveStudio(id,Object.assign({},s,{statut:inferStatut(s.steps)}));toast('Restaure');}
async function supprimerStudio(id){
  if(!confirm('Supprimer definitivement ?'))return;
  await sb.from('studios').delete().eq('id',id);
  delete S.studios[id];S.view='dashboard';S.selectedId=null;render();toast('Supprime');
}
async function createStudio(){
  var f=S.newForm;
  if(!f.name||!f.addr||!f.ouverture){toast('Remplissez tous les champs');return;}
  var id='proj_'+Date.now();
  var steps={};STEPS.forEach(function(s){steps[s.id]=false;});
  var ca1=num(f.annualCA,CA_A1);
  await saveStudio(id,{
    name:f.name,addr:f.addr,societe:f.societe||'P&W Occitanie',ouverture:f.ouverture,
    statut:'pipeline',capex:306200,emprunt:214340,alertes:['Nouveau projet'],steps:steps,
    forecast:{annualCA:ca1,annualCA2:Math.round(ca1*1.10),annualCA3:Math.round(ca1*1.21),
      moisDebut:num(f.moisDebut,0),annee:num(f.annee||2026),actuel:{},actuel2:{},actuel3:{}}
  });
  S.showNewForm=false;toast('Studio cree');
}

async function askAI(){
  var q=document.getElementById('aiq');if(!q||!q.value)return;
  S.aiLoading=true;S.aiResp='';render();
  var s=S.studios[S.selectedId];
  var ctx='Studio Club Pilates: '+s.name+', societe: '+s.societe+', statut: '+s.statut+'. ';
  ctx+='BP adherents cible: 285 fin A1, 345 fin A2, 400 fin A3. ';
  ctx+='Repartition: Pack4 47% a 110 EUR HT, Pack8 50% a 193.33 EUR HT, Illimite 3% a 276.67 EUR HT. ';
  ctx+='CA BP: A1='+fmt(s.forecast&&s.forecast.annualCA||CA_A1)+', A2='+fmt(s.forecast&&s.forecast.annualCA2||CA_A2)+', A3='+fmt(s.forecast&&s.forecast.annualCA3||CA_A3)+'. ';
  ctx+='CAPEX: '+fmt(s.capex||306200)+', emprunt: '+fmt(s.emprunt||214340)+'.';
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'Tu es un expert financier Club Pilates France. '+ctx+' Reponds en francais, de maniere concise et chiffree.',
        messages:[{role:'user',content:q.value}]
      })
    });
    var d=await r.json();
    S.aiResp=(d.content&&d.content[0]&&d.content[0].text)||'Pas de reponse.';
  }catch(e){S.aiResp='Erreur de connexion.';}
  S.aiLoading=false;render();
}

function render(){
  var root=document.getElementById('root');
  if(!root)return;
  if(S.view==='auth')root.innerHTML=renderAuth();
  else if(S.view==='dashboard')root.innerHTML=renderDashboard();
  else if(S.view==='detail')root.innerHTML=renderDetail();
}

sb.auth.getSession().then(function(res){
  var session=res.data&&res.data.session;
  if(session){
    S.user=session.user;
    sb.from('profiles').select('*').eq('id',session.user.id).single().then(function(r){
      S.profile=r.data;
      loadAll().then(function(){S.view='dashboard';render();});
    });
  } else {render();}
});
</script>
</body>
