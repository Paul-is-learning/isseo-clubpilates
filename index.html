.app{max-width:1100px;margin:0 auto;padding:1.5rem}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}

.btn{padding:8px 16px;border:0.5px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
.btn:hover{background:#f0f0ea}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-full{width:100%}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#f0f0ea;border-radius:8px;padding:0.7rem 0.9rem}
.kpi-label{font-size:11px;color:#888;margin-bottom:3px}
.kpi-val{font-size:15px;font-weight:600}
.tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:0.5px solid #e0e0d8;padding-bottom:8px;flex-wrap:wrap}
.tab{padding:4px 14px;border-radius:6px;background:transparent;border:0.5px solid transparent;cursor:pointer;font-size:13px}
.tab.active{background:#f0f0ea;border-color:#ccc;font-weight:500}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:#bbb}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;white-space:nowrap}
.prog-bar{background:#e8e8e0;border-radius:4px;height:6px}
.box{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:5px 6px;text-align:center;border-bottom:0.5px solid #e8e8e0}
th{font-weight:500;color:#888;background:#f5f5f0}
td.lbl{text-align:left;padding-left:8px;color:#555;min-width:130px}
.month-btn{padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;border:0.5px solid #ccc;background:#f0f0ea}
.month-btn.ok{background:#E1F5EE;color:#0F6E56;border-color:#1D9E75;font-weight:500}
.months-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.fg input,.fg select{width:100%;padding:8px 10px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.edit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.info-box{background:#f0f0ea;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:12px}
.chip{font-size:12px;background:#f0f0ea;border-radius:6px;padding:3px 10px;cursor:pointer;display:inline-block;margin:3px 3px 0 0}
.file-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #e8e8e0}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.yr-tab{padding:4px 14px;border-radius:6px;background:transparent;border:0.5px solid transparent;cursor:pointer;font-size:12px}
.yr-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
@media(max-width:600px){.form-grid,.edit-grid{grid-template-columns:1fr}}
@media(max-width:640px){.activity-grid{grid-template-columns:1fr!important}.echanges-grid{grid-template-columns:1fr!important}}
@keyframes locPulse{0%{transform:scale(0.5);opacity:0.7}80%{transform:scale(2);opacity:0}100%{transform:scale(2);opacity:0}}

input[type=range].zone-slider{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:linear-gradient(to right,#1D9E75 0%,#1D9E75 var(--pct,40%),#e2e8f0 var(--pct,40%),#e2e8f0 100%);outline:none;cursor:pointer}

.loc-pulse-ring{position:absolute;width:100%;height:100%;border-radius:50%;background:rgba(15,110,86,0.35);animation:locPulse 2.2s ease-out infinite}

// Renvoie le détail CAPEX pour un studio avec les montants custom si définis
function getCapexDetailForStudio(sid){
  var s=S.studios[sid];
  var ov=s&&s.capexDetail||{};
  return BUDGET_CAPEX_DETAIL.map(function(line,i){
    var key='l'+i;
    var montant=ov[key]!==undefined?ov[key]:line.montant;
    return Object.assign({},line,{montant:montant});
  });
}
// Calcule les totaux capex/leasing depuis un détail
function computeCapexTotals(detail){
  var capex=0,leasing=0;
  detail.forEach(function(line){
    if(line.leasing){leasing+=line.montant;}
    else{capex+=line.montant;} // inclut la remise (négatif)
  });
  return{capex:capex,leasing:leasing};
}
// Renvoie les opts BP d'un studio (loyer + capex custom)
function getStudioBPOpts(sid){
  var s=S.studios[sid];
  if(!s)return{};
  var opts={};
  if(s.loyer_mensuel>0)opts.lm=s.loyer_mensuel;
  if(s.capexDetail&&Object.keys(s.capexDetail).length>0){
    var det=getCapexDetailForStudio(sid);
    var tots=computeCapexTotals(det);
    opts.capex=tots.capex;
    opts.leasing=tots.leasing;
    opts.emprunt=Math.round(tots.capex*0.70); // 70% du CAPEX custom → emprunt bancaire
  }
  if(s.tauxInteret!=null&&s.tauxInteret>=0.01)opts.tauxInteret=s.tauxInteret;
  return opts;
}

// Construit un BP mensuel fidèle au dossier de financement Lattes (p.9)
// Utilise les CA mensuels absolus calculés depuis les adhérents BP
function buildBPFromDossier(annualCA,moisDebut,annee,sid,opts){
  opts=opts||{};
  // Sélectionner la table de CA mensuel de référence selon l'année
  // Si le CA passé diffère du CA de référence (studio custom), on scale proportionnellement
  var caRef=annee===1?CA_A1:annee===2?CA_A2:CA_A3;
  var caMensuelRef=annee===1?CA_MENSUEL_A1:annee===2?CA_MENSUEL_A2:CA_MENSUEL_A3;
  var ratio=annualCA/caRef; // = 1.0 pour les studios standard, autre si CA custom
  var ch=getStudioCharges(sid||'lattes',annee,opts.lm);
  // Régler amort proportionnellement au CAPEX custom (règle ii)
  var CAPEX_REF=333500,LEASING_REF=121600,EMPRUNT_REF=230000,TAUX_REF=0.0373;
  if(opts.capex&&opts.capex>0&&Math.round(opts.capex)!==CAPEX_REF)
    ch.amort=Math.round(ch.amort*opts.capex/CAPEX_REF);
  // Régler creditbail proportionnellement au leasing custom
  if(opts.leasing&&opts.leasing>0&&Math.round(opts.leasing)!==LEASING_REF)
    ch.creditbail=Math.round(ch.creditbail*opts.leasing/LEASING_REF);
  // Charges financières : ajustement emprunt + taux d'intérêt custom
  var empruntEffectif=opts.emprunt||EMPRUNT_REF;
  var tauxEffectif=opts.tauxInteret!=null?opts.tauxInteret:TAUX_REF;
  var _hasCustomFin=(opts.emprunt&&Math.round(opts.emprunt)!==EMPRUNT_REF)||(opts.tauxInteret!=null&&Math.abs(opts.tauxInteret-TAUX_REF)>0.0001);
  if(_hasCustomFin)ch.charges_fin=Math.round(ch.charges_fin*(empruntEffectif/EMPRUNT_REF)*(tauxEffectif/TAUX_REF));
  // Remboursement capital mensuel (amortissement linéaire 7 ans)
  var rembtMensuel=Math.round(empruntEffectif/7/12);

  // Royalties annuelles exactes du dossier (pas de recalcul approximatif)
  var royaltiesAnnuelles=annee===1?39204:annee===2?53303:66628;
  // Ratio royalties mensuel = proportionnel au CA mensuel
  var royaltiesRatio=royaltiesAnnuelles/(annee===1?CA_A1:annee===2?CA_A2:CA_A3);

  // IS annuel calculé sur le résultat exact du dossier
  var totalChargesHorsFinIS=ch.fournitures+ch.loyer+ch.charges_loc+ch.coachs+royaltiesAnnuelles
    +ch.pub+ch.software+ch.assurance+ch.mutuelle+ch.nettoyage+ch.compta+ch.entretien
    +ch.missions+ch.telecom+ch.social+ch.creditbail+ch.salaries+ch.impots_taxes+ch.amort;
  var rexAnnuel=annualCA-totalChargesHorsFinIS;
  var rcaiAnnuel=rexAnnuel-ch.charges_fin;
  var isAnnuel=rcaiAnnuel<=0?0:Math.round(Math.min(rcaiAnnuel,42500)*0.15+Math.max(0,rcaiAnnuel-42500)*0.25);

  return Array.from({length:12},function(_,i){
    // CA mensuel = valeur absolue de référence × ratio (= valeur exacte si ratio=1)
    var ca=Math.round(caMensuelRef[i]*ratio);
    var caPresta=Math.round(ca*0.969);
    var row={mi:(moisDebut+i)%12,_ca:ca,annee:annee};
    // Produits — répartition exacte du dossier
    // A1: cours 429000, prives 6600, boutique 13200 sur CA 448800
    row.ca_cours=Math.round(ca*(annee===1?429000/448800:annee===2?583050/610190:728813/761841));
    row.ca_prives=Math.round(ca*(annee===1?6600/448800:annee===2?9200/610190:11500/761841));
    row.ca_boutique=Math.round(ca*(annee===1?13200/448800:annee===2?17940/610190:21528/761841));
    // Charges fixes mensualisées
    row.fournitures=Math.round(ch.fournitures/12);
    row.loyer=Math.round(ch.loyer/12);
    row.charges_loc=Math.round(ch.charges_loc/12);
    row.coachs=Math.round(ch.coachs/12);
    row.royalties=Math.round(ca*royaltiesRatio); // proportionnel au CA mensuel
    row.pub=Math.round(ch.pub/12);
    row.software=Math.round(ch.software/12);
    row.assurance=Math.round(ch.assurance/12);
    row.mutuelle=Math.round(ch.mutuelle/12);
    row.nettoyage=Math.round(ch.nettoyage/12);
    row.compta=Math.round(ch.compta/12);
    row.entretien=Math.round(ch.entretien/12);
    row.missions=Math.round(ch.missions/12);
    row.telecom=Math.round(ch.telecom/12);
    row.social=Math.round(ch.social/12);
    row.creditbail=Math.round(ch.creditbail/12);
    row.salaries=Math.round(ch.salaries/12);
    row.impots=Math.round(ch.impots_taxes/12);
    row.amort=Math.round(ch.amort/12);
    row.charges_fin=Math.round(ch.charges_fin/12);
    row.is=Math.round(isAnnuel/12);

    // Totaux mensuels
    row._charges=CHARGES.reduce(function(s,l){return s+(row[l.id]||0);},0);
    // REX mensuel = CA - toutes charges sauf charges_fin et IS
    var chargesAvantFinIS=CHARGES.filter(function(l){return l.id!=='charges_fin'&&l.id!=='is';}).reduce(function(s,l){return s+(row[l.id]||0);},0);
    row._rex=ca-chargesAvantFinIS;
    // Résultat net mensuel = CA - toutes charges
    row._result=ca-row._charges;
    // EBITDA mensuel = REX + Amortissements (charges financières exclues)
    row._ebitda=row._rex+row.amort;
    // CAF mensuelle = RN + Amort
    row._caf=row._result+row.amort;
    // Remboursement capital mensuel (cash sortant hors P&L)
    row._rembt=rembtMensuel;
    // Cash net disponible = CAF − Remboursement capital
    row._cashnet=row._caf-rembtMensuel;
    return row;
  });
}

function buildBP(annualCA,moisDebut,ramp,sid,opts){
  var annee=annualCA<=(CA_A1*1.1)?1:annualCA<=(CA_A2*1.1)?2:3;
  return buildBPFromDossier(annualCA,moisDebut,annee,sid,opts);
}

function build3YearBP(forecast,sid,opts){
  var md=forecast.moisDebut||0;
  // On utilise TOUJOURS les CA du dossier de financement — les valeurs Supabase sont ignorées
  return {
    a1:buildBPFromDossier(CA_A1,md,1,sid,opts),
    a2:buildBPFromDossier(CA_A2,md,2,sid,opts),
    a3:buildBPFromDossier(CA_A3,md,3,sid,opts),
  };
}

function inferStatut(steps){
  var done=STEPS.filter(function(s){return steps[s.id];}).length;
  if(done===STEPS.length)return 'ouvert';
  if(done>=5)return 'chantier';
  if(done>=1)return 'preparation';
  return 'pipeline';
}

async function loadAll(){
  var res=await sb.from('studios').select('id,data');
  var data=res.data||[];
  var studios={};
  S.files={};S.depenses={};S.messages={};S.adherents={};S.topics={};S.todos={};
  data.forEach(function(r){
    var id=r.id;
    if(id.endsWith('_files')){S.files[id.slice(0,-6)]=r.data&&r.data.files||[];}
    else if(id.endsWith('_depenses')){S.depenses[id.slice(0,-9)]=r.data&&r.data.depenses||[];}
    else if(id==='global_chat'){S.globalChat=r.data&&r.data.messages||[];}
    else if(id==='_admin_settings'){S.adminSettings=Object.assign({blocked:[],roles:{},viewers:[]},r.data&&r.data.settings||{});}
    else if(id==='_avatars'){S.avatarUrls=r.data&&r.data.avatars||{};}
    else if(id.endsWith('_messages')){S.messages[id.slice(0,-9)]=r.data&&r.data.messages||[];}
    else if(id.endsWith('_topics')){S.topics[id.slice(0,-7)]=r.data&&r.data.topics||[];}
    else if(id.endsWith('_todos')){S.todos[id.slice(0,-6)]=r.data&&r.data.todos||[];}
    else if(id.endsWith('_adherents')){S.adherents[id.slice(0,-10)]=r.data&&r.data.actuel||{};}
    else if(id.endsWith('_scenarios')){S.scenarios[id.slice(0,-10)]=r.data&&r.data.scenarios||[];}
    else if(id.endsWith('_simconfig')){
      var sc=r.data&&r.data.config||{};
      if(Object.keys(sc).length>0){
        // Reset complet si les prix sauvegardés sont les anciens defaults incorrects (117/206/294)
        if(sc.prix4===117&&sc.prix8===206&&sc.prixi===294){
          sc.prix4=110;sc.prix8=193.33;sc.prixi=276.67;
          sc.p4=47;sc.p8=50;sc.pi=3; // Reset aussi les proportions au BP
        }
        S.simConfig[id.slice(0,-10)]=sc;
        try{localStorage.setItem('isseo_sim_'+id.slice(0,-10),JSON.stringify(sc));}catch(e){}
      }
    }
    else{studios[id]=r.data;}
  });
  if(Object.keys(studios).length>0)S.studios=studios;
  // Fallback localStorage pour studios sans simConfig Supabase
  Object.keys(S.studios).forEach(function(k){
    if(!S.simConfig[k]||Object.keys(S.simConfig[k]).length===0){
      try{
        var lc=JSON.parse(localStorage.getItem('isseo_sim_'+k)||'null');
        if(lc){
          // Purge cache localStorage si anciens prix incorrects
          if(lc.prix4===117&&lc.prix8===206&&lc.prixi===294){
            lc.prix4=110;lc.prix8=193.33;lc.prixi=276.67;lc.p4=47;lc.p8=50;lc.pi=3;
            localStorage.setItem('isseo_sim_'+k,JSON.stringify(lc));
          }
          S.simConfig[k]=lc;
        }
      }catch(e){}
    }
  });
  // Patch config fields from INIT — source of truth is the code
  Object.keys(INIT).forEach(function(k){
    if(!S.studios[k])return;
    var changed=false;
    ['ouverture','capex','emprunt','leasing'].forEach(function(f){
      if(INIT[k][f]!==undefined&&S.studios[k][f]!==INIT[k][f]){S.studios[k][f]=INIT[k][f];changed=true;}
    });
    if(INIT[k].forecast&&INIT[k].forecast.moisDebut!==undefined&&S.studios[k].forecast&&S.studios[k].forecast.moisDebut!==INIT[k].forecast.moisDebut){
      S.studios[k].forecast.moisDebut=INIT[k].forecast.moisDebut;changed=true;
    }
    if(changed)sb.from('studios').upsert({id:k,data:S.studios[k],updated_at:new Date().toISOString()});
  });
}

var _simSaveTimeout={};
function saveSimConfig(sid){
  // 1. localStorage immédiat — survit au refresh même si Supabase échoue
  try{localStorage.setItem('isseo_sim_'+sid,JSON.stringify(S.simConfig[sid]));}catch(e){}
  // 2. Supabase avec debounce 500ms — partage inter-utilisateurs
  if(_simSaveTimeout[sid])clearTimeout(_simSaveTimeout[sid]);
  _simSaveTimeout[sid]=setTimeout(function(){
    sb.from('studios').upsert({id:sid+'_simconfig',data:{config:S.simConfig[sid]},updated_at:new Date().toISOString()});
  },500);
}

async function _confirmerScenario(sid){
  var comment=(document.getElementById('scenario-comment')||{}).value||'';
  if(!comment.trim()){
    var err=document.getElementById('scenario-err');
    if(err)err.textContent='Le commentaire est obligatoire pour enregistrer.';
    return;
  }
  var cfg=S.simConfig[sid]||{p4:47,p8:50,pi:3,prix4:110,prix8:193.33,prixi:276.67};
  var now=new Date();
  var sc={
    id:'sc_'+Date.now(),
    auteur:(S.profile&&S.profile.nom)||'Admin',
    comment:comment.trim(),
    date:now.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.toISOString(),
    config:JSON.parse(JSON.stringify(cfg))
  };
  if(!S.scenarios[sid])S.scenarios[sid]=[];
  S.scenarios[sid].push(sc);
  await saveScenarios(sid);
  saveSimConfig(sid);
  var modal=document.getElementById('scenario-modal');
  if(modal)modal.remove();
  toast('Scénario enregistré par '+sc.auteur);
  render();
}

function chargerScenario(sid,scenarioId){
  if(scenarioId==='bp_default'){
    S.simConfig[sid]={p4:47,p8:50,pi:3,prix4:110,prix8:193.33,prixi:276.67};
    saveSimConfig(sid);
    toast('Valeurs BP par défaut restaurées');
    render();
    return;
  }
  var scenarios=S.scenarios[sid]||[];
  var sc=scenarios.find(function(s){return s.id===scenarioId;});
  if(!sc)return;
  S.simConfig[sid]=JSON.parse(JSON.stringify(sc.config));
  saveSimConfig(sid);
  toast('Scénario de '+sc.auteur+' chargé');
  render();
}

async function supprimerScenario(sid,scenarioId){
  if(!confirm('Supprimer ce scénario ?'))return;
  S.scenarios[sid]=(S.scenarios[sid]||[]).filter(function(s){return s.id!==scenarioId;});
  await saveScenarios(sid);
  toast('Scénario supprimé');
  render();
}

// Vérification échéances (appelée au login)
async function checkEcheances(){
  if(!S.user)return;
  var now=new Date();var ids=Object.keys(S.studios);
  ids.forEach(function(sid){
    var s=S.studios[sid];if(!s||!s.alertes)return;
    s.alertes.forEach(function(a){
      // Chercher des dates dans les alertes (format DD/MM/YYYY)
      var m=a.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if(!m)return;
      var d=new Date(m[3],m[2]-1,m[1]);
      var diff=Math.ceil((d-now)/(1000*60*60*24));
      if(diff>=0&&diff<=14){
        // Vérifier si déjà notifié aujourd'hui
        var todayStr=now.toISOString().slice(0,10);
        var already=S.notifications.find(function(n){return n.type==='echeance'&&n.studio_id===sid&&n.body===a&&n.created_at&&n.created_at.slice(0,10)===todayStr;});
        if(!already){
          sb.from('notifications').insert({type:'echeance',user_id:S.user.id,source_user_id:S.user.id,studio_id:sid,title:'\u00c9ch\u00e9ance dans '+diff+'j — '+s.name,body:a,read:false});
        }
      }
    });
  });
}

var _tauxTimeout={};
var _tauxPending={}; // bloque l'écrasement par syncData pendant le debounce
function saveTauxInteret(sid,valPct){
  // Ignorer les valeurs vides, nulles ou hors plage raisonnable
  if(!valPct||isNaN(valPct)||valPct<1||valPct>15)return;
  var taux=valPct/100;
  if(!S.studios[sid])return;
  // Mise à jour locale immédiate
  S.studios[sid].tauxInteret=taux;
  // Marquer comme "en attente d'écriture" → syncData ne doit pas écraser
  _tauxPending[sid]=true;
  if(_tauxTimeout[sid])clearTimeout(_tauxTimeout[sid]);
  _tauxTimeout[sid]=setTimeout(function(){
    _tauxPending[sid]=false;
    sb.from('studios').upsert({id:sid,data:S.studios[sid],updated_at:new Date().toISOString()});
    render();
  },1200);
}

async function uploadAvatar(input){
  var file=input.files&&input.files[0];
  if(!file||!S.user||!S.profile)return;
  if(file.size>8*1024*1024){toast('Fichier trop volumineux (max 8MB)');return;}
  var nom=(S.profile.nom||'').toLowerCase().trim();
  var ext=file.name.split('.').pop().toLowerCase()||'jpg';
  var path='avatars/'+S.user.id+'.'+ext;
  toast('Chargement de la photo…');
  var up=await sb.storage.from('studio-files').upload(path,file,{upsert:true,contentType:file.type});
  if(up.error){toast('Erreur upload : '+up.error.message);return;}
  var pu=sb.storage.from('studio-files').getPublicUrl(path);
  var url=pu.data&&pu.data.publicUrl;
  if(!url){toast('Erreur URL publique');return;}
  // Cache-bust URL pour forcer le rechargement du navigateur
  url=url.split('?')[0]+'?v='+Date.now();
  S.avatarUrls[nom]=url;
  // Persister en Supabase
  var ex=await sb.from('studios').select('data').eq('id','_avatars').maybeSingle();
  var existing=(ex.data&&ex.data.data&&ex.data.data.avatars)||{};
  existing[nom]=url;
  await sb.from('studios').upsert({id:'_avatars',data:{avatars:existing},updated_at:new Date().toISOString()});
  toast('Photo mise à jour ! ✓');
  render();renderChat();
  // Reset input pour permettre un re-upload du même fichier
  input.value='';
}

// ── Recherche globale ──────────────────────────────────────────────────────
function globalSearch(query){
  if(!query||query.length<2)return[];
  var q=query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  var results=[];
  var filter=ROLE_FILTER[S.profile&&S.profile.role];
  var ids=Object.keys(S.studios).filter(function(id){return !filter||filter(S.studios[id]);});
  ids.forEach(function(id){
    var s=S.studios[id];
    // Studios
    var fields=[s.name,s.societe,s.addr||'',s.ouverture||''].join(' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(fields.indexOf(q)>=0)results.push({type:'studio',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',title:s.name,subtitle:s.societe+' · '+s.ouverture,studioId:id,tab:null,color:'#1a3a6b'});
    // Alertes
    (s.alertes||[]).forEach(function(a){
      var an=a.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(an.indexOf(q)>=0)results.push({type:'alerte',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',title:a,subtitle:s.name,studioId:id,tab:'alertes',color:'#DC2626'});
    });
    // Étapes workflow non complétées
    STEPS.forEach(function(step){
      if(!s.steps[step.id]){
        var ln=step.label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        if(ln.indexOf(q)>=0)results.push({type:'workflow',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',title:step.label,subtitle:s.name+' · En attente',studioId:id,tab:'workflow',color:'#7C3AED'});
      }
    });
    // Messages
    (S.messages[id]||[]).forEach(function(m){
      var mt=(m.text||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(mt.indexOf(q)>=0)results.push({type:'message',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',title:(m.text||'').substring(0,60)+(m.text&&m.text.length>60?'…':''),subtitle:s.name+' · '+(m.user||''),studioId:id,tab:'echanges',color:'#3B6FB6'});
    });
    // Documents
    (S.files[id]||[]).forEach(function(f){
      var fn=(f.name||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(fn.indexOf(q)>=0)results.push({type:'document',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',title:f.name,subtitle:s.name,studioId:id,tab:'fichiers',color:'#0F6E56'});
    });
    // Dépenses
    (S.depenses[id]||[]).forEach(function(d){
      var dl=(d.label||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(dl.indexOf(q)>=0)results.push({type:'depense',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',title:d.label,subtitle:s.name+' · '+fmt(d.montant||0),studioId:id,tab:'engagements',color:'#B8860B'});
    });
  });
  return results.slice(0,8);
}

function handleSearchNav(idx){
  var results=globalSearch(S.searchQuery);
  var r=results[idx];
  if(!r)return;
  S.searchQuery='';S.searchOpen=false;S.searchIdx=-1;
  if(r.tab){
    S.view='detail';S.selectedId=r.studioId;S.detailTab=r.tab;
  }else{
    openDetail(r.studioId);
  }
  render();
}

function onSearchInput(el){
  S.searchQuery=el.value;
  S.searchIdx=-1;
  S.searchOpen=el.value.length>=2;
  // Re-render just the dropdown
  var dd=document.getElementById('search-dropdown');
  if(dd){
    if(S.searchOpen){dd.innerHTML=renderSearchResultsInner();dd.style.display='block';}
    else{dd.style.display='none';}
  }
}

function onSearchKeydown(e){
  if(!S.searchOpen)return;
  var results=globalSearch(S.searchQuery);
  if(e.key==='ArrowDown'){e.preventDefault();S.searchIdx=Math.min(S.searchIdx+1,results.length-1);var dd=document.getElementById('search-dropdown');if(dd)dd.innerHTML=renderSearchResultsInner();}
  else if(e.key==='ArrowUp'){e.preventDefault();S.searchIdx=Math.max(S.searchIdx-1,-1);var dd=document.getElementById('search-dropdown');if(dd)dd.innerHTML=renderSearchResultsInner();}
  else if(e.key==='Enter'&&S.searchIdx>=0){e.preventDefault();handleSearchNav(S.searchIdx);}
  else if(e.key==='Escape'){S.searchQuery='';S.searchOpen=false;S.searchIdx=-1;e.target.value='';e.target.blur();var dd=document.getElementById('search-dropdown');if(dd)dd.style.display='none';}
}

function renderSearchResultsInner(){
  var results=globalSearch(S.searchQuery);
  if(!results.length)return '<div style="padding:16px 20px;text-align:center;color:#999;font-size:12px">Aucun résultat pour « '+S.searchQuery+' »</div>';
  var h='';
  var lastType='';
  var TYPE_LABELS={studio:'Studios',alerte:'Alertes',workflow:'Workflow',message:'Messages',document:'Documents',depense:'Dépenses'};
  results.forEach(function(r,i){
    if(r.type!==lastType){
      lastType=r.type;
      h+='<div style="padding:6px 16px 4px;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px'+(i>0?';border-top:1px solid #f0f0ea;margin-top:2px':'')+'">'+TYPE_LABELS[r.type]+'</div>';
    }
    var sel=i===S.searchIdx;
    h+='<div onclick="handleSearchNav('+i+')" onmouseover="S.searchIdx='+i+';var dd=document.getElementById(\'search-dropdown\');if(dd)dd.innerHTML=renderSearchResultsInner()" style="display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-radius:6px;margin:1px 6px;transition:background 0.1s;background:'+(sel?'#f0f4ff':'transparent')+'" '+(sel?'':'')+'>';
    h+='<div style="flex-shrink:0;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:'+(sel?r.color+'15':r.color+'10')+';color:'+r.color+'">'+r.icon+'</div>';
    h+='<div style="min-width:0;flex:1"><div style="font-size:12px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+highlightMatch(r.title,S.searchQuery)+'</div>';
    h+='<div style="font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.subtitle+'</div></div>';
    h+='</div>';
  });
  return h;
}

function highlightMatch(text,query){
  if(!query)return text;
  var idx=text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').indexOf(query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  if(idx<0)return text;
  return text.substring(0,idx)+'<mark style="background:#FBBF24;color:#1a1a1a;border-radius:2px;padding:0 1px">'+text.substring(idx,idx+query.length)+'</mark>'+text.substring(idx+query.length);
}

  box+='<button onclick="document.getElementById(\'pwd-modal-overlay\').remove()" style="background:none;border:none;font-size:20px;color:#999;cursor:pointer;padding:0;line-height:1">&times;</button>';

  box+='<input id="pwd-new" type="password" autocomplete="new-password" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:14px;box-sizing:border-box;outline:none;transition:border 0.2s" onfocus="this.style.borderColor=\'#1D9E75\'" onblur="this.style.borderColor=\'#ddd\'">';
  box+='<label style="font-size:11px;font-weight:600;color:#666;display:block;margin-bottom:4px">Confirmer le nouveau mot de passe</label>';
  box+='<input id="pwd-confirm" type="password" autocomplete="new-password" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:20px;box-sizing:border-box;outline:none;transition:border 0.2s" onfocus="this.style.borderColor=\'#1D9E75\'" onblur="this.style.borderColor=\'#ddd\'">';
  box+='<button id="pwd-submit-btn" onclick="doChangePassword()" style="width:100%;padding:11px;background:#1a3a6b;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.2s" onmouseover="this.style.opacity=\'0.9\'" onmouseout="this.style.opacity=\'1\'">Enregistrer</button>';
  box+='<div style="font-size:10px;color:#aaa;text-align:center;margin-top:10px">Minimum 8 caract\u00e8res</div>';
  box+='</div>';
  overlay.innerHTML=box;
  document.body.appendChild(overlay);
  setTimeout(function(){var el=document.getElementById('pwd-old');if(el)el.focus();},80);
}

async function doChangePassword(){
  var errEl=document.getElementById('pwd-error');
  var btn=document.getElementById('pwd-submit-btn');
  var oldPwd=document.getElementById('pwd-old').value;
  var newPwd=document.getElementById('pwd-new').value;
  var confirmPwd=document.getElementById('pwd-confirm').value;
  function showErr(msg){errEl.textContent=msg;errEl.style.display='block';}
  errEl.style.display='none';
  if(!oldPwd){showErr('Veuillez saisir votre mot de passe actuel.');return;}
  if(newPwd.length<8){showErr('Le nouveau mot de passe doit contenir au moins 8 caract\u00e8res.');return;}
  if(newPwd!==confirmPwd){showErr('Les deux mots de passe ne correspondent pas.');return;}
  btn.textContent='V\u00e9rification...';btn.disabled=true;btn.style.opacity='0.6';
  // Vérifier l'ancien mot de passe
  var email=S.user&&S.user.email;
  if(!email){showErr('Erreur : email utilisateur introuvable.');btn.textContent='Enregistrer';btn.disabled=false;btn.style.opacity='1';return;}
  var check=await sb.auth.signInWithPassword({email:email,password:oldPwd});
  if(check.error){showErr('Mot de passe actuel incorrect.');btn.textContent='Enregistrer';btn.disabled=false;btn.style.opacity='1';return;}
  // Mettre à jour
  btn.textContent='Mise \u00e0 jour...';
  var upd=await sb.auth.updateUser({password:newPwd});
  if(upd.error){showErr('Erreur : '+upd.error.message);btn.textContent='Enregistrer';btn.disabled=false;btn.style.opacity='1';return;}
  var overlay=document.getElementById('pwd-modal-overlay');
  if(overlay)overlay.remove();
  toast('Mot de passe modifi\u00e9 avec succ\u00e8s \u2713');
}

async function toggleViewer(uid,enable){
  if(!isSuperAdmin())return;
  var viewers=S.adminSettings.viewers||[];
  if(enable){if(viewers.indexOf(uid)<0)viewers.push(uid);}
  else{viewers=viewers.filter(function(id){return id!==uid;});}
  S.adminSettings.viewers=viewers;
  var ok=await saveAdminSettings();
  if(ok)toast(enable?'Mode lecture seule activé.':'Mode lecture seule désactivé.');
  render();
}

async function setUserRole(uid,role){
  if(!isSuperAdmin())return;
  if(!S.adminSettings.roles)S.adminSettings.roles={};
  S.adminSettings.roles[uid]=role;
  var ok=await saveAdminSettings();
  var label=ROLE_LABELS[role]||role;
  if(ok)toast('Rôle mis à jour : '+label+'. Effectif sous 5s pour l\'utilisateur.');
}

// ── Activité récente — 3 colonnes : Tâches | Chat | Alertes ──────────────
function renderActivityFeed(ids){
  // ── 1. Collecter toutes les tâches actives (non done) ──
  var allTasks=[];
  var today=new Date().toISOString().slice(0,10);
  ids.forEach(function(id){
    (S.todos[id]||[]).forEach(function(t){
      if(t.statut==='done')return;
      var overdue=t.deadline&&t.deadline<today;
      var soon=t.deadline&&!overdue&&t.deadline<=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
      allTasks.push({studioId:id,studioName:S.studios[id].name,task:t,overdue:overdue,soon:soon});
    });
  });
  var taskOrder={doing:0,vu:1,todo:2};
  allTasks.sort(function(a,b){
    var oa=taskOrder[a.task.statut]!=null?taskOrder[a.task.statut]:2;
    var ob=taskOrder[b.task.statut]!=null?taskOrder[b.task.statut]:2;
    if(oa!==ob)return oa-ob;
    if(a.task.deadline&&b.task.deadline)return a.task.deadline.localeCompare(b.task.deadline);
    if(a.task.deadline)return -1;if(b.task.deadline)return 1;
    return (b.task.ts||'').localeCompare(a.task.ts||'');
  });
  allTasks=allTasks.slice(0,6);

function renderStatusFilters(ids){

  ids.forEach(function(id){var st=S.studios[id].statut;if(counts[st]!==undefined)counts[st]++;});
  var filters=[{id:'all',label:'Tous'}];
  Object.keys(STATUT_CFG).forEach(function(k){if(counts[k]>0)filters.push({id:k,label:STATUT_CFG[k].label});});
  var h='<div style="display:flex;gap:5px;flex-wrap:wrap">';
  filters.forEach(function(f){

    var cfg=STATUT_CFG[f.id];

// ── Vue Cohorte ─────────────────────────────────────────────────────────────
function renderCohorteView(ids){
  // Group studios by cohorte value
  var groups={};
  ids.forEach(function(id){
    var c=S.studios[id].cohorte||1;
    if(!groups[c])groups[c]=[];
    groups[c].push(id);
  });
  var cohortNums=Object.keys(groups).map(Number).sort();
  var h='';
  cohortNums.forEach(function(cn){
    var cIds=groups[cn];
    // Compute cohort-level stats
    var totalCapex=cIds.reduce(function(s,id){return s+S.studios[id].capex;},0);
    var totalCA=cIds.reduce(function(s,id){return s+(S.studios[id].forecast&&S.studios[id].forecast.annualCA||0);},0);
    var avgProgress=Math.round(cIds.reduce(function(s,id){
      var done=STEPS.filter(function(st){return S.studios[id].steps[st.id];}).length;
      return s+(done/STEPS.length*100);
    },0)/cIds.length);

    h+='<div style="background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:18px 20px;margin-bottom:14px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
    h+='<div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px;font-weight:700;color:#1a1a1a">Cohorte '+cn+'</span><span style="font-size:11px;color:#888;background:#f0f0ea;padding:2px 8px;border-radius:10px">'+cIds.length+' studio'+(cIds.length>1?'s':'')+'</span></div>';
    h+='<div style="display:flex;gap:14px;font-size:11px;color:#888"><span>CAPEX '+fmt(totalCapex)+'</span><span>CA BP '+fmt(totalCA)+'</span><span>Avancement '+avgProgress+'%</span></div>';
    h+='</div>';
    h+='<div class="cards">';
    cIds.forEach(function(id){h+=renderCard(id,S.studios[id]);});
    h+='</div></div>';
  });
  if(!cohortNums.length)h+='<div style="text-align:center;color:#bbb;padding:30px;font-size:13px">Aucun studio dans cette vue</div>';
  return h;
}

    h+='<button class="btn" style="color:#A32D2D" onclick="supprimerStudio(\''+S.selectedId+'\')">Supprimer</button></div>';

function renderWorkflow(s){
  var canEdit=!!S.profile&&!isViewer();
  var sid=S.selectedId;
  // Infographie en tête de page
  var h=renderBP3YInfographic(sid,s);
  h+='<div class="box" style="margin-top:16px">'+progBar(s.steps)+'<div style="margin-top:16px">';
  STEPS.forEach(function(step,i){
    var done=s.steps[step.id];
    var unlocked=i===0||s.steps[STEPS[i-1].id];
    var bg=done?'#1D9E75':'transparent';
    var border=done?'#1D9E75':unlocked?'#aaa':'#ddd';

// ── Infographie KPIs prévisionnels 3 ans — onglet Workflow ────────────────────
function renderBP3YInfographic(sid,s){
  var bp=build3YearBP(s.forecast||{},sid,getStudioBPOpts(sid));
  var annee0=s.forecast&&s.forecast.annee||2026;
  var md=s.forecast&&s.forecast.moisDebut||0;

  // 36 monthly rows BP
  var allRows=bp.a1.concat(bp.a2).concat(bp.a3);
  var caArr=allRows.map(function(r){return r._ca||0;});
  var ebtArr=allRows.map(function(r){return r._ebitda||0;});

  // Annual aggregates (BP)
  var YR=[bp.a1,bp.a2,bp.a3].map(function(rows,yi){
    var ca=0,ebitda=0,rex=0,rnet=0,cashnet=0;
    rows.forEach(function(r){ca+=r._ca;ebitda+=r._ebitda;rex+=r._rex;rnet+=r._result;cashnet+=(r._cashnet||0);});
    var offset=yi*12,mbrs=0,lastMbrs=0;
    for(var i=0;i<12;i++){
      var v=offset+i<BP_ADHERENTS.length?BP_ADHERENTS[offset+i]:400;
      mbrs+=v; if(i===11)lastMbrs=v;
    }
    return{ca:ca,ebitda:ebitda,rex:rex,rnet:rnet,cashnet:cashnet,avgMbrs:Math.round(mbrs/12),lastMbrs:lastMbrs,annee:annee0+yi};
  });

  // ── Simulation Adhérents — même logique exacte que l'onglet Adhérents ────────
  var simCfg=S.simConfig&&S.simConfig[sid]||{p4:47,p8:50,pi:3,prix4:110,prix8:193.33,prixi:276.67};
  var actuelWF=S.adherents[sid]||{};
  // ARPU de référence BP (utilisé comme base de calcul proportionnel)
  var BP_ARPU_REF=computeSimARPU({p4:47,p8:50,pi:3,prix4:110,prix8:193.33,prixi:276.67}); // ~156.67
  var simARPU=computeSimARPU(simCfg);
  var arpuRatio=BP_ARPU_REF>0?simARPU/BP_ARPU_REF:1;
  // CA simulé mensuel = CA_BP_mois × (adhérents_réels/adhérents_BP) × (ARPU_custom/ARPU_BP)
  // → garantit que réels=BP + prix=BP → simCA=CA_BP exactement
  var simMonthlyCA=[];
  var lastActualMonth=-1;
  for(var si=0;si<36;si++){
    var ayWF=Math.floor(si/12)+1;
    var mWF=si%12;
    var keyWF='y'+ayWF+'_m'+mWF;
    var bpM=si<BP_ADHERENTS.length?BP_ADHERENTS[si]:400;
    var hasActual=actuelWF[keyWF]!==undefined;
    var sm=hasActual?actuelWF[keyWF]:bpM;
    if(hasActual)lastActualMonth=si;
    var bpCAm=caArr[si]||0;
    var adherRatio=bpM>0?sm/bpM:0;
    simMonthlyCA.push(Math.round(bpCAm*adherRatio*arpuRatio));
  }
  var SIM_YR=[0,1,2].map(function(yi){
    var caM=simMonthlyCA.slice(yi*12,(yi+1)*12);
    var caAn=caM.reduce(function(s,v){return s+v;},0);
    var rows=buildBP(caAn,md,null,sid,getStudioBPOpts(sid));
    var eb=rows.reduce(function(s,r){return s+(r._ebitda||0);},0);
    return{ca:caAn,ebitda:eb};
  });

  // ── EBITDA simulé mensuel (delta CA → delta EBITDA, charges fixes) ────────
  var simEbtArr=[];
  for(var sei=0;sei<36;sei++){
    simEbtArr.push(ebtArr[sei]+(simMonthlyCA[sei]-(caArr[sei]||0)));
  }

  // ── SVG Chart 36 mois (redesign) ────────────────────────────────────────────
  var W=620,H=220,PL=52,PR=16,PT=18,PB=28;
  var cW=W-PL-PR,cH=H-PT-PB,N=36;
  var maxV=Math.max(Math.max.apply(null,caArr),Math.max.apply(null,simMonthlyCA))*1.12||1;
  function xp(i){return PL+i*(cW/(N-1));}
  function yv(v){return PT+cH-(Math.max(0,v)/maxV)*cH;}

  // Break-even dynamique (basé sur EBITDA simulé)
  var beM=-1;
  for(var k=1;k<N;k++){if(simEbtArr[k]>0&&simEbtArr[k-1]<=0){beM=k;break;}}
  var beMoiLabel='';
  if(beM>=0){var beMoisIdx=(md+beM)%12;beMoiLabel=MOIS[beMoisIdx]+' '+(annee0+Math.floor(beM/12));}

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">';

  // Defs : gradients + ombres + clip
  svg+='<defs>';
  svg+='<linearGradient id="caGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1D9E75" stop-opacity="0.22"/><stop offset="100%" stop-color="#1D9E75" stop-opacity="0.02"/></linearGradient>';
  svg+='<linearGradient id="caGradFade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1D9E75" stop-opacity="0.08"/><stop offset="100%" stop-color="#1D9E75" stop-opacity="0.01"/></linearGradient>';
  svg+='<linearGradient id="ebtGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B8860B" stop-opacity="0.16"/><stop offset="100%" stop-color="#B8860B" stop-opacity="0.02"/></linearGradient>';
  svg+='<linearGradient id="beGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0F6E56" stop-opacity="0.12"/><stop offset="100%" stop-color="#0F6E56" stop-opacity="0"/></linearGradient>';
  svg+='<filter id="glowCA"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg+='<filter id="glowDot"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg+='<filter id="glowBE"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg+='<filter id="badgeShadow"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F6E56" flood-opacity="0.35"/></filter>';
  svg+='</defs>';

  // Fond principal du chart
  svg+='<rect x="'+PL+'" y="'+PT+'" width="'+cW+'" height="'+cH+'" rx="4" fill="#fafaf8"/>';

  // Year bands + séparateurs
  var bandBg=['rgba(29,158,117,0.04)','rgba(15,110,86,0.035)','rgba(184,134,11,0.035)'];
  for(var y=0;y<3;y++){
    var bx0=xp(y*12),bx1=y<2?xp((y+1)*12):W-PR;
    svg+='<rect x="'+bx0+'" y="'+PT+'" width="'+(bx1-bx0)+'" height="'+cH+'" fill="'+bandBg[y]+'"/>';
    if(y>0)svg+='<line x1="'+bx0+'" y1="'+(PT+2)+'" x2="'+bx0+'" y2="'+(PT+cH-2)+'" stroke="#d0d5cf" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.6"/>';
    svg+='<text x="'+((bx0+bx1)/2)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10" fill="#a0a098" font-weight="600" letter-spacing="0.5">A'+(y+1)+' \u00b7 '+(annee0+y)+'</text>';
  }

  // Grid lines (4 niveaux + base)
  [0,0.25,0.5,0.75,1].forEach(function(t){
    var gv=Math.round(maxV*t);
    var gy=yv(gv);
    var isBase=t===0;
    svg+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="'+(isBase?'#c5c5be':'#ececea')+'" stroke-width="'+(isBase?0.8:0.5)+'"'+(t>0?' stroke-dasharray="2,4"':'')+'/>';
    svg+='<text x="'+(PL-6)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="9" fill="#b5b5ad" font-weight="500">'+Math.round(gv/1000)+'k</text>';
  });

  // Zone rouge pâle avant break-even
  if(beM>0){
    svg+='<rect x="'+PL+'" y="'+PT+'" width="'+(xp(beM)-PL)+'" height="'+cH+'" fill="rgba(200,50,50,0.025)" rx="3"/>';
  } else if(beM<0){
    svg+='<rect x="'+PL+'" y="'+PT+'" width="'+cW+'" height="'+cH+'" fill="rgba(200,50,50,0.025)" rx="3"/>';
  }

  // ── CA BP — ligne bleue pointillée sur toute la durée ──
  var caL='';caArr.forEach(function(v,i){caL+=(i===0?'M':'L')+xp(i)+' '+yv(v)+' ';});
  svg+='<path d="'+caL+'" fill="none" stroke="#3B6FB6" stroke-width="1.8" stroke-dasharray="7,4" stroke-linecap="round" opacity="0.45"/>';

  // ── Aire gradient complète (réel + BP continuation) ──
  var fullA='M'+xp(0)+' '+(PT+cH);
  simMonthlyCA.forEach(function(v,i){fullA+=' L'+xp(i)+' '+yv(v);});
  fullA+=' L'+xp(N-1)+' '+(PT+cH)+' Z';
  if(lastActualMonth>=0){
    // Aire réelle (opaque) + aire projection (fade)
    var cutX=xp(lastActualMonth);
    svg+='<clipPath id="clipReal"><rect x="'+PL+'" y="0" width="'+(cutX-PL)+'" height="'+H+'"/></clipPath>';
    svg+='<clipPath id="clipProj"><rect x="'+cutX+'" y="0" width="'+(W-cutX)+'" height="'+H+'"/></clipPath>';
    svg+='<path d="'+fullA+'" fill="url(#caGrad)" clip-path="url(#clipReal)"/>';
    svg+='<path d="'+fullA+'" fill="url(#caGradFade)" clip-path="url(#clipProj)"/>';
  } else {
    svg+='<path d="'+fullA+'" fill="url(#caGradFade)"/>';
  }

  // ── CA Réel — ligne verte pleine (uniquement mois renseignés) ──
  if(lastActualMonth>=0){
    var realL='';
    for(var ri=0;ri<=lastActualMonth;ri++){realL+=(ri===0?'M':'L')+xp(ri)+' '+yv(simMonthlyCA[ri])+' ';}
    svg+='<path d="'+realL+'" fill="none" stroke="#1D9E75" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" filter="url(#glowCA)"/>';
    // Continuation BP après dernier mois réel — vert pointillé léger
    var projL='M'+xp(lastActualMonth)+' '+yv(simMonthlyCA[lastActualMonth]);
    for(var pi=lastActualMonth+1;pi<N;pi++){projL+=' L'+xp(pi)+' '+yv(caArr[pi]);}
    svg+='<path d="'+projL+'" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.35"/>';
    // Point de transition lumineux
    svg+='<circle cx="'+xp(lastActualMonth)+'" cy="'+yv(simMonthlyCA[lastActualMonth])+'" r="5.5" fill="#1D9E75" opacity="0.15" filter="url(#glowDot)"/>';
    svg+='<circle cx="'+xp(lastActualMonth)+'" cy="'+yv(simMonthlyCA[lastActualMonth])+'" r="4" fill="#fff" stroke="#1D9E75" stroke-width="2"/>';
    svg+='<circle cx="'+xp(lastActualMonth)+'" cy="'+yv(simMonthlyCA[lastActualMonth])+'" r="1.8" fill="#1D9E75"/>';
  } else {
    // Aucune donnée réelle → tout en BP pointillé vert
    var bpOnlyL='';caArr.forEach(function(v,i){bpOnlyL+=(i===0?'M':'L')+xp(i)+' '+yv(v)+' ';});
    svg+='<path d="'+bpOnlyL+'" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round" opacity="0.4"/>';
  }

  // ── EBITDA simulé — aire gradient + ligne dorée ──
  var eseg=null;
  simEbtArr.forEach(function(v,i){
    if(v>0){if(!eseg)eseg='M'+xp(i)+' '+(PT+cH);eseg+=' L'+xp(i)+' '+yv(v);}
    else{if(eseg){eseg+=' L'+xp(i-1)+' '+(PT+cH)+' Z';svg+='<path d="'+eseg+'" fill="url(#ebtGrad)"/>';eseg=null;}}
  });
  if(eseg){eseg+=' L'+xp(N-1)+' '+(PT+cH)+' Z';svg+='<path d="'+eseg+'" fill="url(#ebtGrad)"/>';}
  var ebtL='';simEbtArr.forEach(function(v,i){ebtL+=(i===0?'M':'L')+xp(i)+' '+yv(Math.max(0,v))+' ';});
  svg+='<path d="'+ebtL+'" fill="none" stroke="#B8860B" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';

  // ── Dots : jalons réels (vert) + EBITDA (doré) ──
  [0,11,23,35].forEach(function(di){
    if(di<=lastActualMonth){
      svg+='<circle cx="'+xp(di)+'" cy="'+yv(simMonthlyCA[di])+'" r="3.5" fill="#1D9E75" stroke="#fff" stroke-width="1.5"/>';
    }
    if(simEbtArr[di]>0)svg+='<circle cx="'+xp(di)+'" cy="'+yv(simEbtArr[di])+'" r="2.5" fill="#B8860B" stroke="#fff" stroke-width="1"/>';
  });

  // ── Break-even — ligne glow + badge premium ──
  if(beM>=0){
    var bx=xp(beM);
    // Gradient vertical derrière la ligne
    svg+='<rect x="'+(bx-8)+'" y="'+PT+'" width="16" height="'+cH+'" fill="url(#beGrad)"/>';
    // Ligne verticale avec glow
    svg+='<line x1="'+bx+'" y1="'+(PT+2)+'" x2="'+bx+'" y2="'+(PT+cH)+'" stroke="#0F6E56" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.75" filter="url(#glowBE)"/>';
    // Cercle indicateur sur la baseline
    svg+='<circle cx="'+bx+'" cy="'+(PT+cH)+'" r="4" fill="#0F6E56" stroke="#fff" stroke-width="1.5"/>';
    // Badge premium avec ombre
    var beLabelTxt='BREAK EVEN \u00b7 '+beMoiLabel;
    var labelW=beLabelTxt.length*5.2+20;
    var labelX=Math.min(bx-labelW/2,W-PR-labelW);
    labelX=Math.max(PL,labelX);
    var labelY=PT+6;
    svg+='<rect x="'+labelX+'" y="'+labelY+'" width="'+labelW+'" height="20" rx="10" fill="#0F6E56" filter="url(#badgeShadow)"/>';
    svg+='<text x="'+(labelX+labelW/2)+'" y="'+(labelY+13.5)+'" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700" letter-spacing="0.4">'+beLabelTxt+'</text>';
  }
  svg+='</svg>';

  // ── HTML ────────────────────────────────────────────────────────────────────
  var ACCENTS=['#4d7a5c','#0F6E56','#8a5a0e'];

  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px">';

  h+='<div style="display:flex;align-items:flex-start;gap:0">';

  h+='<div style="font-size:7.5px;text-transform:uppercase;letter-spacing:2.5px;color:#1a3a6b;font-weight:700;margin-bottom:5px">Projection financi&egrave;re</div>';
  h+='<div style="font-size:17px;font-weight:700;color:#0f1f3d;letter-spacing:-0.5px;line-height:1.2">Performance pr&eacute;visionnelle <span style="font-weight:300;color:#94a3b8">/</span> <span style="color:#1a3a6b">3 ans</span></div>';
  h+='<div style="font-size:10px;color:#94a3b8;margin-top:5px;font-weight:400;letter-spacing:0.1px">Ouverture '+s.ouverture+' &middot; Club Pilates</div>';
  h+='</div></div>';
  // Partie droite : KPI pills style consulting
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';

    h+='<div style="background:'+k.bg+';border:1px solid '+k.border+';border-radius:8px;padding:7px 14px;text-align:center;min-width:82px">';

function buildAdherentSVG(labels,bp,real,annee){

  var cW=W-PL-PR,cH=H-PT-PB;
  var allVals=bp.concat(real.filter(function(v){return v!==null;}));
  var maxV=Math.max.apply(null,allVals)*1.12;
  function xPos(i){return PL+i*(cW/(labels.length-1));}
  function yPos(v){return PT+cH-(v/maxV)*cH;}
  var h='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">';
  for(var g=0;g<=5;g++){
    var gv=Math.round(maxV*g/5);

    h+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#e8e8e0" stroke-width="1"/>';
    h+='<text x="'+(PL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#aaa">'+gv+'</text>';

// ── Forecast ──────────────────────────────────────────────────────────────────
function renderForecast(sid,s){
  var fy=S.forecastYear||1;
  var fs=S.forecastSection||'summary';
  var fc=s.forecast||{};
  var bps=build3YearBP(fc,sid,getStudioBPOpts(sid));
  var bp=fy===1?bps.a1:fy===2?bps.a2:bps.a3;
  var actuelKey=fy===1?'actuel':fy===2?'actuel2':'actuel3';
  var actuel=fc[actuelKey]||{};
  var annee=(fc.annee||2026)+(fy-1);
  var moisDebut=fc.moisDebut||0;
  var annualCA=fy===1?CA_A1:fy===2?CA_A2:CA_A3; // toujours depuis les constantes dossier

  var totals=bp.map(function(r,idx){
    var a=actuel[idx]||{};
    var hasReal=Object.keys(a).length>0;
    var aCA=hasReal?num(a.ca_cours)+num(a.ca_prives)+num(a.ca_boutique):null;
    var aCharges=hasReal?CHARGES.reduce(function(sum,l){return sum+num(a[l.id]!=null?a[l.id]:r[l.id]);},0):null;
    var aEBITDA=hasReal?(aCA+num(a.amort!=null?a.amort:r.amort)-CHARGES_NO_AMORT.reduce(function(sum,l){return sum+num(a[l.id]!=null?a[l.id]:r[l.id]);},0)):null;
    var aREX=hasReal?(aCA-CHARGES.filter(function(l){return l.id!=='charges_fin'&&l.id!=='is';}).reduce(function(sum,l){return sum+num(a[l.id]!=null?a[l.id]:r[l.id]);},0)):null;
    return{
      bpCA:r._ca,bpCharges:r._charges,bpResult:r._result,
      bpEBITDA:r._ebitda,bpREX:r._rex,bpCAF:r._caf,bpCashnet:r._cashnet||0,
      aCA:aCA,aCharges:aCharges,aResult:hasReal?aCA-aCharges:null,
      aEBITDA:aEBITDA,aREX:aREX,hasReal:hasReal
    };
  });

  var rm=totals.filter(function(t){return t.hasReal;});
  var cumBPCA=totals.reduce(function(s,t){return s+t.bpCA;},0);
  var cumActCA=rm.reduce(function(s,t){return s+t.aCA;},0);
  var cumBPRes=totals.reduce(function(s,t){return s+t.bpResult;},0);
  var cumActRes=rm.reduce(function(s,t){return s+t.aResult;},0);
  var cumBPEBITDA=totals.reduce(function(s,t){return s+t.bpEBITDA;},0);
  var cumBPREX=totals.reduce(function(s,t){return s+t.bpREX;},0);
  var cumBPCAF=totals.reduce(function(s,t){return s+t.bpCAF;},0);
  var cumBPCashnet=totals.reduce(function(s,t){return s+(t.bpCashnet||0);},0);
  var cumActEBITDA=rm.reduce(function(s,t){return s+t.aEBITDA;},0);
  var refCA=rm.reduce(function(s,t){return s+t.bpCA;},0);
  var ecartCA=refCA?Math.round((cumActCA/refCA-1)*100):0;
  // Référence dossier pour l'année sélectionnée
  var refDossier=(getStudioResultats(sid))[fy]||(getStudioResultats(sid))[1];
  var moisLabels=[];
  for(var i=0;i<12;i++){moisLabels.push(MOIS[(moisDebut+i)%12]);}

  var h='<div>';
  // ── Réglage loyer mensuel (règle i) ─────────────────────────────────────────
  if(!isViewer()){
    var lmDefault=isLattesStudio(sid)?Math.round(38850/12):4800;
    var lmCurrent=s.loyer_mensuel>0?s.loyer_mensuel:lmDefault;
    h+='<div style="display:flex;align-items:center;gap:10px;background:#f8f9fb;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-bottom:14px;flex-wrap:wrap">';

    h+='<span style="font-size:11px;color:#888;margin-left:4px">→ Loyer annuel BP : <b style="color:#0f1f3d">'+fmt(lmCurrent*12)+'</b>&nbsp;&nbsp;Référence : <b>'+fmt(lmDefault*12)+'</b></span>';
    h+='</div>';
  }
  h+='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">';

  if(fs==='summary'){
    var rows=[
      {l:'CA BP',vals:totals.map(function(t){return t.bpCA;}),tot:cumBPCA,bold:true},

    h+='<div style="overflow-x:auto"><table>';

    h+='<tr style="background:#f0faf5"><td class="lbl" colspan="14" style="font-weight:700;color:#0F6E56;padding:6px 8px">EBITDA</td></tr>';
    h+='<tr style="background:#f0faf5"><td class="lbl" style="padding-left:16px;font-weight:600;color:#0F6E56">EBITDA mensuel</td>';
    var totEB=0;

      if(t.hasReal)h+='<div style="font-size:10px;color:'+(t.aResult>=0?'#3B6D11':'#A32D2D')+';font-weight:600">'+fmtN(t.aResult)+'</div>';

        if(refV!=null&&!isAdh){
          var diffPct=isPct?(v-refV):(Math.round((v/refV-1)*100));
          if(diffPct!==0)diffTxt='<div style="font-size:9px;color:'+(diffPct>=0?'#3B6D11':'#A32D2D')+'">'+(diffPct>0?'+':'')+diffPct+(isPct?'pp':'%')+' vs ref</div>';

      });
      h+='<td style="font-weight:700;color:'+(isGreen?'#0F6E56':isTreso?((cum)>=0?'#0F6E56':'#A32D2D'):'inherit')+'">'+(isPct||isAdh?'--':fmt(cum))+'</td></tr>';
    });
    h+='</table></div>';

    h+='</div>';
    // Graphique CA 3 ans
    h+=renderCA3Chart(a1s,a2s,a3s,fc);
  }
  h+='</div>';
  return h;
}

function renderCA3Chart(a1s,a2s,a3s,fc){
  // Mode superposé : 3 courbes sur le même axe X (12 mois), chacune représente une année
  // Beaucoup plus lisible que 36 points en séquence avec un pic M2 dominant
  var years=[a1s,a2s,a3s];
  var colors=['#5b7fa6','#1D9E75','#854F0B'];
  var labels=['A1 ('+(fc.annee||2026)+')','A2 ('+(fc.annee?fc.annee+1:2027)+')','A3 ('+(fc.annee?fc.annee+2:2028)+')'];
  var W=680,H=200,PL=56,PR=16,PT=20,PB=36;
  var cW=W-PL-PR,cH=H-PT-PB;

  // Max sur toutes les courbes (hors M2 A1 pour ne pas écraser les autres)
  var allVals=[].concat(a1s,a2s,a3s).map(function(r){return r._ca;});
  // Exclure le pic M2 A1 du calcul du max pour un meilleur scaling
  var valsNoSpike=allVals.filter(function(v,i){return i!==1;});
  var maxNorm=Math.max.apply(null,valsNoSpike)*1.15;
  var maxV=Math.max(maxNorm,allVals[1]*0.6); // garde le pic visible mais pas écrasant

  function xp(i){return PL+i*(cW/11);}
  function yp(v){return PT+cH-Math.min((v/maxV)*cH,cH);}

  var MOIS_SHORT=['J','F','M','A','M','J','J','A','S','O','N','D'];
  var moisDebut=fc.moisDebut||0;

  var h='<div class="box">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<div style="font-weight:600;font-size:13px">CA mensuel &mdash; 3 ans superposes</div>';
  h+='<div style="display:flex;gap:14px">';
  years.forEach(function(ys,yi){
    var caAn=ys.reduce(function(s,r){return s+r._ca;},0);
    h+='<div style="display:flex;align-items:center;gap:5px">';
    h+='<div style="width:16px;height:3px;background:'+colors[yi]+';border-radius:2px"></div>';
    h+='<span style="font-size:11px;color:'+colors[yi]+';font-weight:600">'+labels[yi]+'</span>';
    h+='<span style="font-size:10px;color:#aaa">'+fmt(caAn)+'</span>';
    h+='</div>';
  });
  h+='</div></div>';
  h+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">';

  // Grilles horizontales
  for(var g=0;g<=4;g++){
    var gv=Math.round(maxV*g/4);
    var gy=yp(gv);
    h+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#e8e8e0" stroke-width="1"/>';
    h+='<text x="'+(PL-4)+'" y="'+(gy+3)+'" text-anchor="end" font-size="8" fill="#bbb">'+fmt(gv)+'</text>';
  }

  // Labels mois en bas
  for(var i=0;i<12;i++){
    var ml=MOIS_SHORT[(moisDebut+i)%12];
    h+='<text x="'+xp(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#aaa">'+ml+'</text>';
  }
  // Grilles verticales légères
  for(var i=0;i<12;i++){
    h+='<line x1="'+xp(i)+'" y1="'+PT+'" x2="'+xp(i)+'" y2="'+(H-PB)+'" stroke="#f0f0e8" stroke-width="1"/>';
  }

  // EBITDA zones (en dessous des courbes) - seulement A2 et A3 pour ne pas surcharger
  [1,2].forEach(function(yi){
    var ys=years[yi];
    var area='M'+xp(0)+' '+yp(0);
    ys.forEach(function(r,i){area+=' L'+xp(i)+' '+yp(r._ebitda);});
    area+=' L'+xp(11)+' '+yp(0)+' Z';
    h+='<path d="'+area+'" fill="'+colors[yi]+'" opacity="0.07"/>';
  });

  // Courbes
  years.forEach(function(ys,yi){
    var path='M';
    ys.forEach(function(r,i){path+=(i>0?' L':'')+xp(i)+' '+yp(r._ca);});
    h+='<path d="'+path+'" fill="none" stroke="'+colors[yi]+'" stroke-width="'+(yi===0?'1.5':'2')+'" stroke-dasharray="'+(yi===0?'5,3':'none')+'"/>';
    // Points
    ys.forEach(function(r,i){
      h+='<circle cx="'+xp(i)+'" cy="'+yp(r._ca)+'" r="3" fill="'+colors[yi]+'" opacity="0.8"/>';
    });
    // Valeur fin d'année (M12)
    var lastR=ys[11];
    h+='<text x="'+(xp(11)+6)+'" y="'+(yp(lastR._ca)+3)+'" font-size="8" fill="'+colors[yi]+'" font-weight="600">'+fmt(lastR._ca)+'</text>';
  });

  // Note sur le pic A1 M2
  var peakA1=a1s[1]._ca;
  h+='<text x="'+xp(1)+'" y="'+(PT-5)+'" text-anchor="middle" font-size="7.5" fill="#5b7fa6" opacity="0.7">Opening</text>';

  h+='</svg>';
  h+='<div style="font-size:10px;color:#aaa;margin-top:6px">A1 pointille = rampe opening &middot; A2/A3 plein = croisiere &middot; Zones = EBITDA A2/A3</div>';
  h+='</div>';
  return h;
}

function calcTTC(){
  var ht=num(document.getElementById('dep-ht')&&document.getElementById('dep-ht').value);
  var tva=num(document.getElementById('dep-tva')&&document.getElementById('dep-tva').value,20);
  var el=document.getElementById('dep-ttc');
  if(el)el.value=Math.round(ht*(1+tva/100));
}

async function sauvegarderDepense(sid){
  var cat=document.getElementById('dep-cat')&&document.getElementById('dep-cat').value;
  if(!cat){toast('Selectionnez une categorie');return;}
  if(!S.depenses[sid])S.depenses[sid]=[];
  S.depenses[sid].push({
    categorie:cat,
    description:(document.getElementById('dep-desc')&&document.getElementById('dep-desc').value)||'',
    ht:num(document.getElementById('dep-ht')&&document.getElementById('dep-ht').value),
    tva:num(document.getElementById('dep-tva')&&document.getElementById('dep-tva').value,20),
    ttc:num(document.getElementById('dep-ttc')&&document.getElementById('dep-ttc').value),
    financement:(document.getElementById('dep-fin')&&document.getElementById('dep-fin').value)||'Emprunt bancaire',
    engage_par:(document.getElementById('dep-par')&&document.getElementById('dep-par').value)||'',
    date:(document.getElementById('dep-date')&&document.getElementById('dep-date').value)||'',
    deblocage:'attente',fichierUrl:null,fichierPath:null,date_demande:null,date_deblocage:null,
  });
  await saveDepenses(sid);
  var depTTC=num(document.getElementById('dep-ttc')&&document.getElementById('dep-ttc').value);
  notifyAll({type:'depense',studio_id:sid,title:'Nouvelle d\u00e9pense \u2014 '+(S.studios[sid]?S.studios[sid].name:sid),body:cat+' \u2014 '+fmt(depTTC)});
  toast('Depense enregistree');render();
}

async function supprimerDepense(sid,idx){
  if(isViewer())return;
  if(!confirm('Supprimer ?'))return;
  S.depenses[sid].splice(idx,1);
  await saveDepenses(sid);render();
}

async function changerDeblocage(sid,idx){
  if(isViewer())return;
  var d=S.depenses[sid][idx];
  var today=new Date().toLocaleDateString('fr-FR');
  if(d.deblocage==='attente'){d.deblocage='demande';d.date_demande=today;}
  else if(d.deblocage==='demande'){d.deblocage='debloque';d.date_deblocage=today;}
  else{d.deblocage='attente';d.date_demande=null;d.date_deblocage=null;}
  await saveDepenses(sid);render();
}

async function uploadJustif(sid,idx,input){
  if(isViewer())return;
  var file=input.files[0];if(!file)return;
  var path=sid+'/justif_'+Date.now()+'_'+cleanName(file.name);
  var res=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
  if(res.error){toast('Erreur upload');return;}
  var pu=sb.storage.from('studio-files').getPublicUrl(path);
  S.depenses[sid][idx].fichierUrl=pu.data.publicUrl;
  S.depenses[sid][idx].fichierPath=path;
  await saveDepenses(sid);render();
}

function renderMessages(sid){

  var colors=['#185FA5','#0F6E56','#854F0B','#993C1D','#533AB7','#A32D2D'];
  function aC(name){var h=0;for(var i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return colors[Math.abs(h)%colors.length];}
  function ini(name){return name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
  var h='<div><div class="box" style="padding:0;overflow:hidden">';
  h+='<div id="msgs-list" style="height:420px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px">';
  if(msgs.length===0){
    h+='<div style="text-align:center;color:#aaa;font-size:13px;margin:auto">Aucun message</div>';
  } else {
    msgs.forEach(function(m){
      var isMe=m.auteur===me;
      h+='<div style="display:flex;flex-direction:'+(isMe?'row-reverse':'row')+';align-items:flex-end;gap:8px">';
      h+=avatarHTML(m.auteur,32);
      h+='<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+';max-width:72%">';
      h+='<div style="font-size:11px;color:#888;margin-bottom:3px;font-weight:500">'+m.auteur+' &mdash; '+m.date+'</div>';
      h+='<div style="background:'+(isMe?'#1a1a1a':'#f0f0ea')+';color:'+(isMe?'#fff':'#1a1a1a')+';padding:10px 14px;border-radius:'+(isMe?'12px 12px 2px 12px':'12px 12px 12px 2px')+';font-size:13px;line-height:1.5">'+m.texte+'</div>';
      h+='</div></div>';
    });
  }
  h+='</div>';
  if(isViewer()){
    h+='<div style="border-top:0.5px solid #e0e0d8;padding:10px 16px;background:#f8f9fb;text-align:center;font-size:11px;color:#aaa">👁 Mode lecture seule — envoi de messages désactivé</div>';
  } else {
    h+='<div style="border-top:0.5px solid #e0e0d8;padding:12px 16px;display:flex;gap:8px;background:#fff">';
    h+='<input id="msg-input" type="text" placeholder="Votre message..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();envoyerMessage(\''+sid+'\');}" style="flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none"/>';
    h+='<button class="btn btn-primary" onclick="envoyerMessage(\''+sid+'\')">Envoyer</button>';
    h+='</div>';
  }
  h+='</div></div>';
  setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
  return h;
}

async function envoyerMessage(sid){
  if(isViewer())return;
  var input=document.getElementById('msg-input');
  var texte=input&&input.value&&input.value.trim();
  if(!texte)return;
  if(input)input.value=''; // vider l'input immédiatement
  if(!S.messages[sid])S.messages[sid]=[];
  var now=new Date();
  S.messages[sid].push({
    auteur:(S.profile&&S.profile.nom)||'',
    texte:texte,
    date:now.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.toISOString(),
  });
  // Sauvegarder en lisant d'abord la version Supabase pour ne pas écraser les messages des autres
  var ex=await sb.from('studios').select('data').eq('id',sid+'_messages').maybeSingle();
  var existing=(ex.data&&ex.data.data&&ex.data.data.messages)||[];
  // Fusionner : garder les messages existants + ajouter le nouveau
  var dernierMsg=S.messages[sid][S.messages[sid].length-1];
  var merged=existing.concat([dernierMsg]);
  // Dédupliquer par ts
  var seen=new Set();
  merged=merged.filter(function(m){if(seen.has(m.ts))return false;seen.add(m.ts);return true;});
  merged.sort(function(a,b){return a.ts>b.ts?1:-1;});
  S.messages[sid]=merged;
  await sb.from('studios').upsert({id:sid+'_messages',data:{messages:merged},updated_at:new Date().toISOString()});
  // Notification
  notifyAll({type:'message',studio_id:sid,title:'Nouveau message \u2014 '+(S.studios[sid]?S.studios[sid].name:sid),body:texte.length>80?texte.slice(0,80)+'\u2026':texte});
  render();
  setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
}

// Recharger les messages depuis Supabase (pour voir ceux des autres utilisateurs)
async function rechargerMessages(sid){
  var res=await sb.from('studios').select('data').eq('id',sid+'_messages').maybeSingle();
  var msgs=(res.data&&res.data.data&&res.data.data.messages)||[];
  var avant=JSON.stringify(S.messages[sid]||[]);
  S.messages[sid]=msgs;
  // Re-render seulement si nouveaux messages
  if(JSON.stringify(msgs)!==avant){
    render();
    setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
  }
}

// Inline topic list (no outer buttons, compact for side panel)
function renderTopicListInline(sid){
  var topics=(S.topics[sid]||[]).slice().sort(function(a,b){
    if(a.closed!==b.closed)return a.closed?1:-1;
    var aLast=a.messages&&a.messages.length?a.messages[a.messages.length-1].ts:a.ts;
    var bLast=b.messages&&b.messages.length?b.messages[b.messages.length-1].ts:b.ts;
    return (bLast||'').localeCompare(aLast||'');
  });
  if(!topics.length)return '<div style="text-align:center;padding:36px 16px"><div style="width:44px;height:44px;margin:0 auto 10px;border-radius:12px;background:linear-gradient(135deg,#E8F0FE,#D0DFFA);display:flex;align-items:center;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B6FB6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div style="color:#555;font-size:12px;font-weight:600">Aucune discussion</div><div style="color:#bbb;font-size:11px;margin-top:3px">Lancez un sujet pour collaborer</div></div>';

    var lastDate=lastMsg?lastMsg.date:t.date;
    h+='<div onclick="S.openTopicId=\''+t.id+'\';render()" style="padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.12s;border-bottom:1px solid #f8f8f4;opacity:'+(t.closed?'0.5':'1')+'" onmouseover="this.style.background=\'#f8f9fb\'" onmouseout="this.style.background=\'transparent\'">';

    h+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
    if(t.closed)h+='<span style="font-size:8px;background:#f0f0ea;color:#888;padding:1px 5px;border-radius:4px">Clôturé</span>';
    h+='<span style="display:flex;align-items:center;gap:2px;font-size:10px;color:#999"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+msgCount+'</span>';
    h+='</div></div>';
    h+='<div style="font-size:10px;color:#999;margin-top:3px">'+t.auteur+' · '+lastDate+'</div>';
    h+='</div>';
  });
  return h;
}

// Inline tasks list (no outer buttons, compact for side panel)
function renderTachesInline(sid){
  var todos=(S.todos[sid]||[]).slice();
  var order={doing:0,vu:1,todo:2,done:3};
  todos.sort(function(a,b){return (order[a.statut]!=null?order[a.statut]:2)-(order[b.statut]!=null?order[b.statut]:2)||((b.ts||'').localeCompare(a.ts||''));});
  if(!todos.length)return '<div style="text-align:center;padding:36px 16px"><div style="width:44px;height:44px;margin:0 auto 10px;border-radius:12px;background:linear-gradient(135deg,#FEF9EE,#FDF0D5);display:flex;align-items:center;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#854F0B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><div style="color:#555;font-size:12px;font-weight:600">Aucune tâche</div><div style="color:#bbb;font-size:11px;margin-top:3px">Organisez le projet avec des tâches</div></div>';
  var h='';
  todos.forEach(function(t){
    var st=TACHE_STATUTS[t.statut]||TACHE_STATUTS.todo;
    var isDone=t.statut==='done';
    var today=new Date().toISOString().slice(0,10);
    var overdue=t.deadline&&t.deadline<today&&!isDone;
    var soon=t.deadline&&!overdue&&!isDone&&t.deadline<=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
    // Progress per task: todo=0%, vu=33%, doing=66%, done=100%
    var taskPct={todo:0,vu:33,doing:66,done:100}[t.statut]||0;
    var taskBarColor={todo:'#e8e8e0',vu:'#7C3AED',doing:'#1D4ED8',done:'#1D9E75'}[t.statut]||'#e8e8e0';
    h+='<div style="background:#fff;border:0.5px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:6px;opacity:'+(isDone?'0.5':'1')+';transition:all 0.12s">';
    // Row 1: toggle + titre + badge + supprimer
    h+='<div style="display:flex;align-items:center;gap:10px">';
    if(!isViewer()){
      h+='<button onclick="event.stopPropagation();toggleTacheStatut(\''+sid+'\',\''+t.id+'\')" title="Cliquer pour avancer : '+st.label+'" style="width:22px;height:22px;border-radius:50%;border:2px solid '+st.text+';background:'+st.bg+';color:'+st.text+';font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1">'+st.icon+'</button>';
    } else {
      h+='<div style="width:22px;height:22px;border-radius:50%;border:2px solid '+st.text+';background:'+st.bg+';color:'+st.text+';font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1">'+st.icon+'</div>';
    }
    h+='<div style="flex:1;min-width:0;font-size:12px;font-weight:600;color:#1a1a1a;'+(isDone?'text-decoration:line-through;':'')+'">'+t.titre+'</div>';
    h+='<span style="font-size:9px;font-weight:600;padding:2px 6px;border-radius:5px;background:'+st.bg+';color:'+st.text+';white-space:nowrap">'+st.label+'</span>';
    if(!isViewer())h+='<button onclick="event.stopPropagation();supprimerTache(\''+sid+'\',\''+t.id+'\')" style="background:none;border:none;color:#ddd;cursor:pointer;font-size:13px;padding:0;line-height:1;flex-shrink:0;transition:color 0.15s" onmouseover="this.style.color=\'#A32D2D\'" onmouseout="this.style.color=\'#ddd\'" title="Supprimer">×</button>';
    h+='</div>';
    // Row 2: description si présente
    if(t.description)h+='<div style="font-size:11px;color:#888;margin:4px 0 0 32px;'+(isDone?'text-decoration:line-through;':'')+'">'+t.description+'</div>';
    // Row 3: responsable(s) + deadline
    var hasInfo=t.responsable||t.deadline;
    if(hasInfo){
      h+='<div style="display:flex;align-items:center;gap:8px;margin:6px 0 0 32px;flex-wrap:wrap">';
      if(t.responsable){
        h+='<div style="display:flex;align-items:center;gap:4px">'+avatarHTML(t.responsable,18)+'<span style="font-size:10px;color:#555;font-weight:500">'+t.responsable+'</span></div>';
      }
      if(t.deadline){
        var dlabel=new Date(t.deadline+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
        if(overdue)h+='<span style="font-size:9px;font-weight:600;color:#991B1B;background:#FEE2E2;padding:2px 7px;border-radius:5px;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+dlabel+'</span>';
        else if(soon)h+='<span style="font-size:9px;font-weight:600;color:#854F0B;background:#FEF3C7;padding:2px 7px;border-radius:5px;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+dlabel+'</span>';
        else h+='<span style="font-size:9px;color:#888;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+dlabel+'</span>';
      }
      h+='</div>';
    }
    // Task progress bar
    h+='<div style="margin:8px 0 2px 32px;display:flex;align-items:center;gap:6px">';
    h+='<div style="flex:1;background:#e8e8e0;border-radius:3px;height:4px;overflow:hidden"><div style="width:'+taskPct+'%;background:'+taskBarColor+';border-radius:3px;height:4px;transition:width 0.3s"></div></div>';
    h+='<span style="font-size:9px;color:'+st.text+';font-weight:600;white-space:nowrap">'+taskPct+'%</span>';
    h+='</div>';
    h+='</div>';
  });
  // Global progress bar
  var doneCount=todos.filter(function(t){return t.statut==='done';}).length;
  var total=todos.length;
  var pct=total?Math.round(doneCount/total*100):0;
  h+='<div style="padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:10px;color:#999"><div style="flex:1;background:#e8e8e0;border-radius:3px;height:4px"><div style="width:'+pct+'%;background:#1D9E75;border-radius:3px;height:4px;transition:width 0.3s"></div></div>'+doneCount+'/'+total+' terminées</div>';
  return h;
}

// ── DISCUSSIONS (Forum Topics) ──────────────────────────────────────────

function renderDiscussions(sid){
  if(S.openTopicId)return renderTopicThread(sid,S.openTopicId);
  return renderTopicList(sid);
}

function renderTopicList(sid){
  var topics=(S.topics[sid]||[]).slice().sort(function(a,b){
    // Non-closed first, then by latest activity
    if(a.closed!==b.closed)return a.closed?1:-1;
    var aLast=a.messages&&a.messages.length?a.messages[a.messages.length-1].ts:a.ts;
    var bLast=b.messages&&b.messages.length?b.messages[b.messages.length-1].ts:b.ts;
    return (bLast||'').localeCompare(aLast||'');
  });
  var h='';
  if(!isViewer()){
    h+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px">';

    h+='<div class="box" style="text-align:center;padding:40px 20px"><div style="width:48px;height:48px;margin:0 auto 10px;border-radius:14px;background:linear-gradient(135deg,#E8F0FE,#D0DFFA);display:flex;align-items:center;justify-content:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3B6FB6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div style="color:#555;font-size:13px;font-weight:600">Aucune discussion pour le moment</div><div style="color:#bbb;font-size:11px;margin-top:4px">Créez un sujet pour lancer la conversation</div></div>';

    h+='<div onclick="S.openTopicId=\''+t.id+'\';render()" style="background:#fff;border:0.5px solid '+(t.closed?'#e8e8e3':'#e0e0d8')+';border-radius:10px;padding:14px 18px;cursor:pointer;transition:all 0.15s;opacity:'+(t.closed?'0.6':'1')+'" onmouseover="this.style.borderColor=\'#bbb\';this.style.boxShadow=\'0 2px 8px rgba(0,0,0,0.04)\'" onmouseout="this.style.borderColor=\''+(t.closed?'#e8e8e3':'#e0e0d8')+'\';this.style.boxShadow=\'none\'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
    h+='<div style="min-width:0;flex:1">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:13px;font-weight:600;color:#1a1a1a">'+t.titre+'</span>';
