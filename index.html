function buildBP(annualCA,moisDebut=0){
  const ramp=[0.055,0.065,0.075,0.08,0.085,0.09,0.09,0.085,0.085,0.08,0.08,0.075];
  return Array.from({length:12},(_,i)=>{
    const ca=Math.round(annualCA*ramp[i]);
    const row={mi:(moisDebut+i)%12,_ca:ca};
    BP_LINES.forEach(l=>{row[l.id]=l.fixed??Math.round(ca*(l.pctCA||0));});
    row._charges=CHARGES.reduce((s,l)=>s+row[l.id],0);
    row._result=ca-row._charges;
    return row;
  });
}

function renderWorkflow(s){
  const canEdit=S.profile?.role==='admin';
  let h=`<div class="box">${progBar(s.steps)}<div style="margin-top:16px">`;
  STEPS.forEach((step,i)=>{
    const done=s.steps[step.id];
    const unlocked=i===0||s.steps[STEPS[i-1].id];
    h+=`<div style="display:flex;gap:12px;margin-bottom:10px;opacity:${(!done&&!unlocked)?0.4:1}">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="step-dot" style="background:${done?'#1D9E75':'transparent'};border:2px solid ${done?'#1D9E75':unlocked?'#aaa':'#ddd'};cursor:${unlocked&&canEdit?'pointer':'default'}" onclick="${unlocked&&canEdit?`toggleStep('${S.selectedId}','${step.id}')`:''}">${done?'✓':''}</div>
        ${i<STEPS.length-1?`<div style="width:2px;flex:1;min-height:14px;background:${done?'#1D9E75':'#e0e0d8'};margin-top:2px"></div>`:''}
      </div>
      <div style="padding-bottom:8px"><div style="font-size:13px;font-weight:${done?600:400}">${step.label}</div><div style="font-size:11px;color:#888;margin-top:2px">${step.desc}</div></div>
    </div>`;
  });
  return h+'</div></div>';
}

function calcTTC(){
  const ht=num(document.getElementById('dep-ht')?.value);
  const tva=num(document.getElementById('dep-tva')?.value,20);
  const el=document.getElementById('dep-ttc');
  if(el)el.value=Math.round(ht*(1+tva/100));
}

async function sauvegarderDepense(studioId){
  const cat=document.getElementById('dep-cat')?.value;
  if(!cat){toast('Sélectionnez une catégorie');return;}
  if(!S.depenses[studioId])S.depenses[studioId]=[];
  S.depenses[studioId].push({
    categorie:cat,
    description:document.getElementById('dep-desc')?.value||'',
    ht:num(document.getElementById('dep-ht')?.value),
    tva:num(document.getElementById('dep-tva')?.value,20),
    ttc:num(document.getElementById('dep-ttc')?.value),
    financement:document.getElementById('dep-fin')?.value||'Emprunt bancaire',
    engage_par:document.getElementById('dep-par')?.value||'',
    date:document.getElementById('dep-date')?.value||'',
    deblocage:'attente',fichierUrl:null,fichierPath:null,date_demande:null,date_deblocage:null,
  });
  await saveDepenses(studioId);
  toast('Dépense enregistrée');render();
}

async function supprimerDepense(studioId,idx){
  if(!confirm('Supprimer ?'))return;
  S.depenses[studioId].splice(idx,1);
  await saveDepenses(studioId);
  toast('Supprimé');render();
}

async function changerDeblocage(studioId,idx){
  const d=S.depenses[studioId][idx];
  const today=new Date().toLocaleDateString('fr-FR');
  if(d.deblocage==='attente'){d.deblocage='demande';d.date_demande=today;}
  else if(d.deblocage==='demande'){d.deblocage='debloque';d.date_deblocage=today;}
  else{d.deblocage='attente';d.date_demande=null;d.date_deblocage=null;}
  await saveDepenses(studioId);
  toast('Statut déblocage mis à jour');render();
}

async function uploadJustif(studioId,idx,input){
  const file=input.files[0];if(!file)return;
  const path=`${studioId}/justif_${Date.now()}_${cleanName(file.name)}`;
  const {error}=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
  if(error){toast('Erreur upload');return;}
  const {data}=sb.storage.from('studio-files').getPublicUrl(path);
  S.depenses[studioId][idx].fichierUrl=data.publicUrl;
  S.depenses[studioId][idx].fichierPath=path;
  await saveDepenses(studioId);
  toast('Justificatif ajouté');render();
}

async function envoyerMessage(studioId){
  const input=document.getElementById('msg-input');
  const texte=input?.value?.trim();
  if(!texte)return;
  if(!S.messages[studioId])S.messages[studioId]=[];
  const now=new Date();
  S.messages[studioId].push({
    auteur:S.profile?.nom||S.profile?.email||'',
    texte,
    date:now.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.toISOString(),
  });
  await sb.from('studios').upsert({id:studioId+'_messages',data:{messages:S.messages[studioId]},updated_at:new Date().toISOString()});
  render();
  // Scroll vers le bas
  setTimeout(()=>{const el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
}

function renderForecast(s){
  const {forecastSection,editMoisIdx,editVals}=S;
  const {moisDebut,annee,actuel,annualCA}=s.forecast;
  const bp=buildBP(annualCA,moisDebut);
  const totals=bp.map((r,idx)=>{
    const a=actuel[idx]||{};
    const hasReal=Object.keys(a).length>0;
    const aCA=hasReal?num(a.ca_cours)+num(a.ca_prives)+num(a.ca_boutique):null;
    const aCharges=hasReal?CHARGES.reduce((sum,l)=>sum+num(a[l.id],r[l.id]),0):null;
    return{bpCA:r._ca,bpCharges:r._charges,bpResult:r._result,aCA,aCharges,aResult:hasReal?aCA-aCharges:null,hasReal};
  });
  const rm=totals.filter(t=>t.hasReal);
  const cumBPCA=totals.reduce((s,t)=>s+t.bpCA,0);
  const cumActCA=rm.reduce((s,t)=>s+t.aCA,0);
  const cumBPRes=totals.reduce((s,t)=>s+t.bpResult,0);
  const cumActRes=rm.reduce((s,t)=>s+t.aResult,0);
  const ecart=rm.length?Math.round((cumActCA/rm.reduce((s,t)=>s+t.bpCA,0)-1)*100):0;
  let h=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
    ${[['CA BP annuel',fmt(annualCA),''],['CA réel cumulé',fmt(cumActCA),''],['Ecart CA',(ecart>=0?'+':'')+ecart+'%',ecart>=0?'#3B6D11':'#A32D2D'],['Résultat BP',fmt(cumBPRes),''],['Résultat réel',fmt(cumActRes),'']].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val" style="${c?'color:'+c:''}">${v}</div></div>`).join('')}
  </div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    ${[['summary','Synthèse'],['detail','Détail'],['saisie','Saisie']].map(([k,l])=>`<button class="tab ${forecastSection===k?'active':''}" onclick="setFS('${k}')">${l}</button>`).join('')}
  </div>`;
  if(forecastSection==='summary'){
    h+=`<div style="overflow-x:auto"><table><tr><th style="text-align:left;padding-left:8px">Ligne</th>${bp.map(r=>`<th>${MOIS[r.mi]}</th>`).join('')}<th>Total</th></tr>
    ${[{l:'CA — BP',vals:totals.map(t=>t.bpCA),tot:cumBPCA,bold:true},{l:'CA — Réel',vals:totals.map(t=>t.aCA),tot:cumActCA,blue:true},{l:'Charges — BP',vals:totals.map(t=>t.bpCharges),tot:totals.reduce((s,t)=>s+t.bpCharges,0)},{l:'Résultat — BP',vals:totals.map(t=>t.bpResult),tot:cumBPRes,bold:true},{l:'Résultat — Réel',vals:totals.map(t=>t.aResult),tot:cumActRes,blue:true,res:true}].map(row=>`<tr style="background:${row.bold?'#f5f5f0':''}"><td class="lbl" style="font-weight:${row.bold?600:400}">${row.l}</td>${row.vals.map(v=>`<td style="color:${row.blue&&v!==null?(row.res?(v>=0?'#3B6D11':'#A32D2D'):'#185FA5'):'inherit'}">${v===null?'—':fmtN(v)}</td>`).join('')}<td style="font-weight:600">${row.tot?fmtN(row.tot):'—'}</td></tr>`).join('')}
    </table></div>`;
  }
  if(forecastSection==='detail'){
    h+=`<div style="overflow-x:auto"><table><tr><th style="text-align:left;padding-left:8px;min-width:140px">Ligne</th>${bp.map(r=>`<th>${MOIS[r.mi]}</th>`).join('')}</tr>
    <tr><td class="lbl" colspan="13" style="font-weight:600;padding:5px 8px">PRODUITS</td></tr>
    ${PRODUITS.map(l=>`<tr><td class="lbl">${l.label}</td>${bp.map((r,i)=>{const a=actuel[i]?.[l.id];return`<td><div style="font-size:10px">${fmtN(r[l.id])}</div>${a!==undefined?`<div style="font-size:10px;color:#185FA5;font-weight:600">${fmtN(a)}</div>`:''}</td>`;}).join('')}</tr>`).join('')}
    <tr><td class="lbl" colspan="13" style="font-weight:600;padding:5px 8px">CHARGES</td></tr>
    ${CHARGES.map(l=>`<tr><td class="lbl">${l.label}</td>${bp.map((r,i)=>{const a=actuel[i]?.[l.id];return`<td><div style="font-size:10px">${fmtN(r[l.id])}</div>${a!==undefined?`<div style="font-size:10px;color:#185FA5;font-weight:600">${fmtN(a)}</div>`:''}</td>`;}).join('')}</tr>`).join('')}
    <tr style="background:#f5f5f0"><td class="lbl" style="font-weight:600">RÉSULTAT NET</td>${totals.map((t,i)=>`<td><div style="font-size:10px;font-weight:600">${fmtN(bp[i]._result)}</div>${t.hasReal?`<div style="font-size:10px;color:${t.aResult>=0?'#3B6D11':'#A32D2D'};font-weight:600">${fmtN(t.aResult)}</div>`:''}</td>`).join('')}</tr>
    </table></div><div style="font-size:10px;color:#888;margin-top:6px">Gris = BP · Bleu = Réel</div>`;
  }
  if(forecastSection==='saisie'){
    h+=`<div class="months-grid">${bp.map((r,idx)=>{const ok=actuel[idx]&&Object.keys(actuel[idx]).length>0;return`<button class="month-btn ${ok?'ok':''}" onclick="openEditMois(${idx})">${MOIS[r.mi]} ${annee}${ok?' ✓':''}</button>`;}).join('')}</div>`;
    if(editMoisIdx!==null){
      const r=bp[editMoisIdx];
      h+=`<div class="box"><div style="font-weight:600;font-size:14px;margin-bottom:4px">Saisie — ${MOIS[r.mi]} ${annee}</div>
      <div class="sec-title">Produits</div><div class="edit-grid">${PRODUITS.map(l=>`<div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">${l.label} <span style="color:#bbb">(${fmtN(r[l.id])})</span></label><input type="number" value="${editVals[l.id]||''}" oninput="setEV('${l.id}',this.value)" placeholder="${r[l.id]}" style="width:100%;padding:7px 9px;border:0.5px solid #ddd;border-radius:7px;font-size:12px;outline:none"/></div>`).join('')}</div>
      <div class="sec-title">Charges</div><div class="edit-grid">${CHARGES.map(l=>`<div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">${l.label} <span style="color:#bbb">(${fmtN(r[l.id])})</span></label><input type="number" value="${editVals[l.id]||''}" oninput="setEV('${l.id}',this.value)" placeholder="${r[l.id]}" style="width:100%;padding:7px 9px;border:0.5px solid #ddd;border-radius:7px;font-size:12px;outline:none"/></div>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary" onclick="saveMois()">Enregistrer</button><button class="btn" onclick="clearMois()">Effacer</button><button class="btn" onclick="cancelEdit()">Annuler</button></div></div>`;
    }
  }
  return h;
}

function renderFichiers(studioId){
  const files=S.files[studioId]||[];
  const icons={pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',jpg:'🖼',jpeg:'🖼',png:'🖼'};
  const icon=n=>{const e=n.split('.').pop().toLowerCase();return icons[e]||'📎';};
  return `<div class="box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-weight:600;font-size:14px">Documents (${files.length})</span>
      <label class="btn btn-primary" style="cursor:pointer;font-size:12px">+ Ajouter<input type="file" style="display:none" onchange="uploadFichier('${studioId}',this)" multiple/></label>
    </div>
    <div id="uprog-${studioId}" style="display:none;font-size:12px;color:#5b7fa6;margin-bottom:10px">Upload...</div>
    ${files.length===0?`<div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">Aucun document</div>`:files.map(f=>`<div class="file-row"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">${icon(f.name)}</span><div><div style="font-size:13px;font-weight:500">${f.name}</div><div style="font-size:11px;color:#888">${f.date} · ${f.size}</div></div></div><div style="display:flex;gap:8px"><a href="${f.url}" target="_blank" class="btn" style="font-size:12px;text-decoration:none">Ouvrir</a><button class="btn" style="font-size:12px;color:#A32D2D" onclick="deleteFichier('${studioId}','${f.path}')">✕</button></div></div>`).join('')}
  </div>`;
}

function renderAI(s){
  return `<div class="box">
    <div style="font-weight:600;font-size:14px;margin-bottom:10px">Analyste IA</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="aiq" type="text" placeholder="Ex: Quand atteindre le seuil de rentabilite ?" onkeydown="if(event.key==='Enter')askAI()" style="flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none"/>
      <button class="btn btn-primary" onclick="askAI()" ${S.aiLoading?'disabled':''}>${S.aiLoading?'...':'Analyser'}</button>
    </div>
    ${S.aiResp?`<div style="font-size:13px;line-height:1.6;background:#f5f5f0;border-radius:8px;padding:10px 14px;white-space:pre-wrap">${S.aiResp}</div>`:''}
  </div>`;
}

function renderNewForm(){
  const f=S.newForm;
  return `<div class="box">
    <div style="font-weight:600;font-size:15px;margin-bottom:14px">Nouveau studio</div>
    <div class="form-grid">
      <div class="fg"><label>Nom</label><input value="${f.name||''}" oninput="setNF('name',this.value)" placeholder="Ex: Paris 16e"/></div>
      <div class="fg"><label>Adresse</label><input value="${f.addr||''}" oninput="setNF('addr',this.value)" placeholder="Rue, CP Ville"/></div>
      <div class="fg"><label>Société</label><select onchange="setNF('societe',this.value)">${['P&W Occitanie','COBE Society','SACOBE Society'].map(s=>`<option ${f.societe===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="fg"><label>Ouverture</label><input value="${f.ouverture||''}" oninput="setNF('ouverture',this.value)" placeholder="Ex: T2 2027"/></div>
      <div class="fg"><label>CA annuel BP (€)</label><input type="number" value="${f.annualCA||448800}" oninput="setNF('annualCA',this.value)"/></div>
      <div class="fg"><label>Mois ouverture</label><select onchange="setNF('moisDebut',this.value)">${MOIS.map((m,i)=>`<option value="${i}" ${(f.moisDebut||0)==i?'selected':''}>${m}</option>`).join('')}</select></div>
      <div class="fg"><label>Année</label><select onchange="setNF('annee',this.value)">${[2026,2027,2028,2029].map(y=>`<option ${(f.annee||2026)==y?'selected':''}>${y}</option>`).join('')}</select></div>
    </div>
    <div class="info-box">Workflow démarre à l'étape 1 : Test fit local.</div>
    <div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="createStudio()">Créer</button><button class="btn" onclick="toggleNewForm()">Annuler</button></div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('ae').value;
  const pwd=document.getElementById('ap').value;
  const err=document.getElementById('aerr');
  const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){err.style.display='block';err.textContent=error.message;return;}
  S.user=data.user;
  const {data:prof}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
  S.profile=prof;
  await loadStudios();await loadFiles();await loadDepenses();await loadMessages();
  S.view='dashboard';render();
}
async function doLogout(){await sb.auth.signOut();S={...S,user:null,profile:null,view:'auth',selectedId:null};render();}
function openDetail(id){S.view='detail';S.selectedId=id;S.detailTab='workflow';S.aiResp='';render();}
function goBack(){S.view='dashboard';S.selectedId=null;render();}
function setMainTab(t){S.mainTab=t;render();}
function setDetailTab(t){S.detailTab=t;S.aiResp='';render();}
function setFS(s){S.forecastSection=s;S.editMoisIdx=null;render();}
function toggleNewForm(){S.showNewForm=!S.showNewForm;S.newForm={societe:'P&W Occitanie',annualCA:448800,moisDebut:0,annee:2026};render();}
function setNF(k,v){S.newForm[k]=v;}
function setEV(k,v){S.editVals[k]=v;}
function openEditMois(idx){S.editMoisIdx=idx;S.editVals={...(S.studios[S.selectedId].forecast.actuel[idx]||{})};render();}
function cancelEdit(){S.editMoisIdx=null;render();}

async function toggleStep(sid,stepId){
  const s=S.studios[sid];
  const newSteps={...s.steps,[stepId]:!s.steps[stepId]};
  await saveStudio(sid,{...s,steps:newSteps,statut:inferStatut(newSteps)});
  toast('Étape mise à jour');
}
async function saveMois(){
  const s=S.studios[S.selectedId];
  const newActuel={...s.forecast.actuel,[S.editMoisIdx]:{...S.editVals}};
  await saveStudio(S.selectedId,{...s,forecast:{...s.forecast,actuel:newActuel}});
  S.editMoisIdx=null;toast('Saisie enregistrée');
}
async function clearMois(){
  const s=S.studios[S.selectedId];
  const newActuel={...s.forecast.actuel};
  delete newActuel[S.editMoisIdx];
  await saveStudio(S.selectedId,{...s,forecast:{...s.forecast,actuel:newActuel}});
  S.editMoisIdx=null;toast('Mois effacé');
}
async function uploadFichier(studioId,input){
  const files=Array.from(input.files);if(!files.length)return;
  const prog=document.getElementById('uprog-'+studioId);if(prog)prog.style.display='block';
  const {data:existing}=await sb.from('studios').select('data').eq('id',studioId+'_files').maybeSingle();
  const currentFiles=[...(existing?.data?.files||S.files[studioId]||[])];
  let added=0;
  for(const file of files){
    const path=`${studioId}/${Date.now()}_${cleanName(file.name)}`;
    const {error}=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
    if(!error){
      const {data:u}=sb.storage.from('studio-files').getPublicUrl(path);
      const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' Mo':(file.size/1024).toFixed(0)+' Ko';
      currentFiles.push({name:file.name,path,url:u.publicUrl,date:new Date().toLocaleDateString('fr-FR'),size});
      added++;
    }
  }
  await sb.from('studios').upsert({id:studioId+'_files',data:{files:currentFiles},updated_at:new Date().toISOString()});
  S.files[studioId]=currentFiles;
  if(prog)prog.style.display='none';
  toast(added+' fichier(s) ajouté(s)');render();
}
async function deleteFichier(studioId,path){
  if(!confirm('Supprimer ?'))return;
  await sb.storage.from('studio-files').remove([path]);
  S.files[studioId]=(S.files[studioId]||[]).filter(f=>f.path!==path);
  await sb.from('studios').upsert({id:studioId+'_files',data:{files:S.files[studioId]},updated_at:new Date().toISOString()});
  toast('Supprimé');render();
}
async function archiverStudio(id){if(!confirm('Archiver ?'))return;await saveStudio(id,{...S.studios[id],statut:'abandonne'});toast('Archivé');}
async function restaurerStudio(id){const s=S.studios[id];await saveStudio(id,{...s,statut:inferStatut(s.steps)});toast('Restauré');}
async function supprimerStudio(id){
  if(!confirm('Supprimer définitivement ?'))return;
  await sb.from('studios').delete().eq('id',id);
  delete S.studios[id];S.view='dashboard';S.selectedId=null;render();toast('Supprimé');
}
async function createStudio(){
  const f=S.newForm;
  if(!f.name||!f.addr||!f.ouverture){toast('Remplissez tous les champs');return;}
  const id='proj_'+Date.now();
  await saveStudio(id,{name:f.name,addr:f.addr,societe:f.societe||'P&W Occitanie',ouverture:f.ouverture,statut:'pipeline',capex:306200,emprunt:214340,alertes:['Nouveau projet — démarrer par le test fit local'],steps:Object.fromEntries(STEPS.map(s=>[s.id,false])),forecast:{annualCA:num(f.annualCA,448800),moisDebut:num(f.moisDebut,0),annee:num(f.annee,2026),actuel:{}}});
  S.showNewForm=false;toast('Studio créé');
}
async function askAI(){
  const q=document.getElementById('aiq')?.value;if(!q)return;
  S.aiLoading=true;S.aiResp='';render();
  const s=S.studios[S.selectedId];
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`Expert Club Pilates ISSEO. Studio: ${s.name}, statut: ${s.statut}, CAPEX: ${fmt(s.capex)}, BP: ${fmt(s.forecast.annualCA)}. Réponds en français, concis.`,messages:[{role:'user',content:q}]})});
    const d=await r.json();S.aiResp=d.content?.[0]?.text||'Pas de réponse.';
  }catch{S.aiResp='Erreur.';}
  S.aiLoading=false;render();
}

function render(){
  const root=document.getElementById('root');
  if(S.view==='auth')root.innerHTML=renderAuth();
  else if(S.view==='dashboard')root.innerHTML=renderDashboard();
  else if(S.view==='detail')root.innerHTML=renderDetail();
}

sb.auth.getSession().then(async({data:{session}})=>{
  if(session){
    S.user=session.user;
    const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    S.profile=prof;
    await loadStudios();await loadFiles();await loadDepenses();await loadMessages();
    S.view='dashboard';
  }
  render();
});
</script>
