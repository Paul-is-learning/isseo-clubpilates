<!-- PWA service worker registration — prod uniquement, jamais en dev local -->
<script>
(function(){
  var isLocalDev=/^(localhost|127\.0\.0\.1|192\.168\.|10\.)/.test(location.hostname);
  if(!('serviceWorker' in navigator))return;
  if(isLocalDev){
    // En dev : désenregistrer tout SW existant et vider les caches pour éviter les interceptions fantômes
    navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
    if(window.caches&&caches.keys)caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k);});});
    return;
  }
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        if(!nw)return;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            if(typeof toast==='function')toast('Nouvelle version disponible — rechargez pour l\'activer');
          }
        });
      });
    }).catch(function(err){console.warn('[SW] registration failed:',err);});
  });
})();
</script>
