function buildBP(annualCA,moisDebut){
  const ramp=[0.055,0.065,0.075,0.08,0.085,0.09,0.09,0.085,0.085,0.08,0.08,0.075];
  return Array.from({length:12},(_,i)=>{
    const ca=Math.round(annualCA*ramp[i]);
    const row={mi:(moisDebut+i)%12,_ca:ca};
    BP_LINES.forEach(l=>{row[l.id]=l.fixed!=null?l.fixed:Math.round(ca*(l.pctCA||0));});
    row._charges=CHARGES.reduce((s,l)=>s+row[l.id],0);
    row._result=ca-row._charges;
    return row;
  });
}

function renderWorkflow(s){
  var canEdit=S.profile&&S.profile.role==='admin';
  var h='<div class="box">'+progBar(s.steps)+'<div style="margin-top:16px">';
  STEPS.forEach(function(step,i){
    var done=s.steps[step.id];
    var unlocked=i===0||s.steps[STEPS[i-1].id];
    var bg=done?'#1D9E75':'transparent';
    var border=done?'#1D9E75':unlocked?'#aaa':'#ddd';
    var cursor=(unlocked&&canEdit)?'pointer':'default';
    var click=(unlocked&&canEdit)?'onclick="toggleStep(\''+S.selectedId+'\',\''+step.id+'\')"':'';
    h+='<div style="display:flex;gap:12px;margin-bottom:10px;opacity:'+((!done&&!unlocked)?0.4:1)+'">';
    h+='<div style="display:flex;flex-direction:column;align-items:center">';
    h+='<div class="step-dot" style="background:'+bg+';border:2px solid '+border+';cursor:'+cursor+'" '+click+'>'+(done?'v':'')+'</div>';
    if(i<STEPS.length-1)h+='<div style="width:2px;flex:1;min-height:14px;background:'+(done?'#1D9E75':'#e0e0d8')+';margin-top:2px"></div>';
    h+='</div><div style="padding-bottom:8px"><div style="font-size:13px;font-weight:'+(done?600:400)+'">'+step.label+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+step.desc+'</div></div></div>';
  });
  return h+'</div></div>';
}

function calcTTC(){
  var ht=num(document.getElementById('dep-ht')&&document.getElementById('dep-ht').value);
  var tva=num(document.getElementById('dep-tva')&&document.getElementById('dep-tva').value,20);
  var el=document.getElementById('dep-ttc');
  if(el)el.value=Math.round(ht*(1+tva/100));
}

async function sauvegarderDepense(sid){
  var cat=document.getElementById('dep-cat')&&document.getElementById('dep-cat').value;
  if(!cat){toast('Selectionnez une categorie');return;}
  if(!S.depenses[sid])S.depenses[sid]=[];
  S.depenses[sid].push({
    categorie:cat,
    description:(document.getElementById('dep-desc')&&document.getElementById('dep-desc').value)||'',
    ht:num(document.getElementById('dep-ht')&&document.getElementById('dep-ht').value),
    tva:num(document.getElementById('dep-tva')&&document.getElementById('dep-tva').value,20),
    ttc:num(document.getElementById('dep-ttc')&&document.getElementById('dep-ttc').value),
    financement:(document.getElementById('dep-fin')&&document.getElementById('dep-fin').value)||'Emprunt bancaire',
    engage_par:(document.getElementById('dep-par')&&document.getElementById('dep-par').value)||'',
    date:(document.getElementById('dep-date')&&document.getElementById('dep-date').value)||'',
    deblocage:'attente',fichierUrl:null,fichierPath:null,date_demande:null,date_deblocage:null,
  });
  await saveDepenses(sid);
  toast('Depense enregistree');render();
}

async function supprimerDepense(sid,idx){
  if(!confirm('Supprimer ?'))return;
  S.depenses[sid].splice(idx,1);
  await saveDepenses(sid);
  toast('Supprime');render();
}

async function changerDeblocage(sid,idx){
  var d=S.depenses[sid][idx];
  var today=new Date().toLocaleDateString('fr-FR');
  if(d.deblocage==='attente'){d.deblocage='demande';d.date_demande=today;}
  else if(d.deblocage==='demande'){d.deblocage='debloque';d.date_deblocage=today;}
  else{d.deblocage='attente';d.date_demande=null;d.date_deblocage=null;}
  await saveDepenses(sid);
  toast('Statut mis a jour');render();
}

async function uploadJustif(sid,idx,input){
  var file=input.files[0];if(!file)return;
  var path=sid+'/justif_'+Date.now()+'_'+cleanName(file.name);
  var res=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
  if(res.error){toast('Erreur upload');return;}
  var url=sb.storage.from('studio-files').getPublicUrl(path);
  S.depenses[sid][idx].fichierUrl=url.data.publicUrl;
  S.depenses[sid][idx].fichierPath=path;
  await saveDepenses(sid);
  toast('Justificatif ajoute');render();
}

function renderMessages(sid){
  var msgs=S.messages[sid]||[];
  var me=(S.profile&&S.profile.nom)||'';
  var colors=['#185FA5','#0F6E56','#854F0B','#993C1D','#533AB7','#A32D2D'];
  function authorColor(name){var h=0;for(var i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return colors[Math.abs(h)%colors.length];}
  function initials(name){return name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
  var h='<div><div class="box" style="padding:0;overflow:hidden">';
  h+='<div id="msgs-list" style="height:420px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px">';
  if(msgs.length===0){
    h+='<div style="text-align:center;color:#aaa;font-size:13px;margin:auto">Aucun message - soyez le premier a ecrire !</div>';
  } else {
    msgs.forEach(function(m){
      var isMe=m.auteur===me;
      var color=authorColor(m.auteur);
      var ini=initials(m.auteur);
      h+='<div style="display:flex;flex-direction:'+(isMe?'row-reverse':'row')+';align-items:flex-end;gap:8px">';
      h+='<div style="width:32px;height:32px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600;color:#fff">'+ini+'</div>';
      h+='<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+';max-width:72%">';
      h+='<div style="font-size:11px;color:#888;margin-bottom:3px;font-weight:500">'+m.auteur+' - '+m.date+'</div>';
      h+='<div style="background:'+(isMe?'#1a1a1a':'#f0f0ea')+';color:'+(isMe?'#fff':'#1a1a1a')+';padding:10px 14px;border-radius:'+(isMe?'12px 12px 2px 12px':'12px 12px 12px 2px')+';font-size:13px;line-height:1.5">'+m.texte+'</div>';
      h+='</div></div>';
    });
  }
  h+='</div>';
  h+='<div style="border-top:0.5px solid #e0e0d8;padding:12px 16px;display:flex;gap:8px;background:#fff">';
  h+='<input id="msg-input" type="text" placeholder="Votre message..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();envoyerMessage(\''+sid+'\');}" style="flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none"/>';
  h+='<button class="btn btn-primary" onclick="envoyerMessage(\''+sid+'\')">Envoyer</button>';
  h+='</div></div></div>';
  setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
  return h;

async function envoyerMessage(sid){
  var input=document.getElementById('msg-input');
  var texte=input&&input.value&&input.value.trim();
  if(!texte)return;
  if(!S.messages[sid])S.messages[sid]=[];
  var now=new Date();
  S.messages[sid].push({
    auteur:(S.profile&&S.profile.nom)||'',
    texte:texte,
    date:now.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    ts:now.toISOString(),
  });
  await sb.from('studios').upsert({id:sid+'_messages',data:{messages:S.messages[sid]},updated_at:new Date().toISOString()});
  render();
  setTimeout(function(){var el=document.getElementById('msgs-list');if(el)el.scrollTop=el.scrollHeight;},50);
}

function renderForecast(s){
  var fs=S.forecastSection;
  var moisDebut=s.forecast.moisDebut;
  var annee=s.forecast.annee;
  var actuel=s.forecast.actuel;
  var annualCA=s.forecast.annualCA;
  var bp=buildBP(annualCA,moisDebut);
  var totals=bp.map(function(r,idx){
    var a=actuel[idx]||{};
    var hasReal=Object.keys(a).length>0;
    var aCA=hasReal?num(a.ca_cours)+num(a.ca_prives)+num(a.ca_boutique):null;
    var aCharges=hasReal?CHARGES.reduce(function(sum,l){return sum+num(a[l.id]!=null?a[l.id]:r[l.id]);},0):null;
    return{bpCA:r._ca,bpCharges:r._charges,bpResult:r._result,aCA:aCA,aCharges:aCharges,aResult:hasReal?aCA-aCharges:null,hasReal:hasReal};
  });
  var rm=totals.filter(function(t){return t.hasReal;});
  var cumBPCA=totals.reduce(function(s,t){return s+t.bpCA;},0);
  var cumActCA=rm.reduce(function(s,t){return s+t.aCA;},0);
  var cumBPRes=totals.reduce(function(s,t){return s+t.bpResult;},0);
  var cumActRes=rm.reduce(function(s,t){return s+t.aResult;},0);
  var refCA=rm.reduce(function(s,t){return s+t.bpCA;},0);
  var ecart=refCA?Math.round((cumActCA/refCA-1)*100):0;
  var h='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">';
  h+='<div class="kpi"><div class="kpi-label">CA BP annuel</div><div class="kpi-val">'+fmt(annualCA)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">CA reel cumule</div><div class="kpi-val">'+fmt(cumActCA)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Ecart CA</div><div class="kpi-val" style="color:'+(ecart>=0?'#3B6D11':'#A32D2D')+'">'+(ecart>=0?'+':'')+ecart+'%</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Resultat BP</div><div class="kpi-val">'+fmt(cumBPRes)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-label">Resultat reel</div><div class="kpi-val">'+fmt(cumActRes)+'</div></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  h+='<button class="tab '+(fs==='summary'?'active':'')+'" onclick="setFS(\'summary\')">Synthese</button>';
  h+='<button class="tab '+(fs==='detail'?'active':'')+'" onclick="setFS(\'detail\')">Detail</button>';
  h+='<button class="tab '+(fs==='saisie'?'active':'')+'" onclick="setFS(\'saisie\')">Saisie</button>';
  h+='</div>';
  if(fs==='summary'){
    var rows=[
      {l:'CA BP',vals:totals.map(function(t){return t.bpCA;}),tot:cumBPCA,bold:true},
      {l:'CA Reel',vals:totals.map(function(t){return t.aCA;}),tot:cumActCA,blue:true},
      {l:'Charges BP',vals:totals.map(function(t){return t.bpCharges;}),tot:totals.reduce(function(s,t){return s+t.bpCharges;},0)},
      {l:'Resultat BP',vals:totals.map(function(t){return t.bpResult;}),tot:cumBPRes,bold:true},
      {l:'Resultat Reel',vals:totals.map(function(t){return t.aResult;}),tot:cumActRes,blue:true,res:true},
    ];
    h+='<div style="overflow-x:auto"><table>';
    h+='<tr><th style="text-align:left;padding-left:8px">Ligne</th>';
    bp.forEach(function(r){h+='<th>'+MOIS[r.mi]+'</th>';});
    h+='<th>Total</th></tr>';
    rows.forEach(function(row){
      h+='<tr style="background:'+(row.bold?'#f5f5f0':'')+'">';
      h+='<td class="lbl" style="font-weight:'+(row.bold?600:400)+'">'+row.l+'</td>';
      row.vals.forEach(function(v){
        var c=row.blue&&v!==null?(row.res?(v>=0?'#3B6D11':'#A32D2D'):'#185FA5'):'inherit';
        h+='<td style="color:'+c+'">'+(v===null?'--':fmtN(v))+'</td>';
      });
      h+='<td style="font-weight:600">'+(row.tot?fmtN(row.tot):'--')+'</td></tr>';
    });
    h+='</table></div>';
  }
  if(fs==='saisie'){
    h+='<div class="months-grid">';
    bp.forEach(function(r,idx){
      var ok=actuel[idx]&&Object.keys(actuel[idx]).length>0;
      h+='<button class="month-btn '+(ok?'ok':'')+'" onclick="openEditMois('+idx+')">'+MOIS[r.mi]+' '+annee+(ok?' v':'')+'</button>';
    });
    h+='</div>';
    if(S.editMoisIdx!==null){
      var r=bp[S.editMoisIdx];
      h+='<div class="box">';
      h+='<div style="font-weight:600;font-size:14px;margin-bottom:4px">Saisie - '+MOIS[r.mi]+' '+annee+'</div>';
      h+='<div class="sec-title">Produits</div><div class="edit-grid">';
      PRODUITS.forEach(function(l){
        h+='<div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">'+l.label+' ('+fmtN(r[l.id])+')</label>';
        h+='<input type="number" value="'+(S.editVals[l.id]||'')+'" oninput="setEV(\''+l.id+'\',this.value)" placeholder="'+r[l.id]+'" style="width:100%;padding:7px;border:0.5px solid #ddd;border-radius:7px;font-size:12px;outline:none"/></div>';
      });
      h+='</div><div class="sec-title">Charges</div><div class="edit-grid">';
      CHARGES.forEach(function(l){
        h+='<div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">'+l.label+' ('+fmtN(r[l.id])+')</label>';
        h+='<input type="number" value="'+(S.editVals[l.id]||'')+'" oninput="setEV(\''+l.id+'\',this.value)" placeholder="'+r[l.id]+'" style="width:100%;padding:7px;border:0.5px solid #ddd;border-radius:7px;font-size:12px;outline:none"/></div>';
      });
      h+='</div><div style="display:flex;gap:8px;margin-top:12px">';
      h+='<button class="btn btn-primary" onclick="saveMois()">Enregistrer</button>';
      h+='<button class="btn" onclick="clearMois()">Effacer</button>';
      h+='<button class="btn" onclick="cancelEdit()">Annuler</button>';
      h+='</div></div>';
    }
  }
  return h;
}

function renderFichiers(sid){
  var files=S.files[sid]||[];
  var icons={pdf:'doc',doc:'txt',docx:'txt',xls:'xls',xlsx:'xls',jpg:'img',jpeg:'img',png:'img'};
  function icon(n){var e=n.split('.').pop().toLowerCase();return icons[e]||'file';}
  var h='<div class="box">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h+='<span style="font-weight:600;font-size:14px">Documents ('+files.length+')</span>';
  h+='<label class="btn btn-primary" style="cursor:pointer;font-size:12px">+ Ajouter<input type="file" style="display:none" onchange="uploadFichier(\''+sid+'\',this)" multiple/></label>';
  h+='</div>';
  h+='<div id="uprog-'+sid+'" style="display:none;font-size:12px;color:#5b7fa6;margin-bottom:10px">Upload...</div>';
  if(files.length===0){
    h+='<div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">Aucun document</div>';
  } else {
    files.forEach(function(f){
      h+='<div class="file-row">';
      h+='<div style="display:flex;align-items:center;gap:10px">';
      h+='<span style="font-size:13px;background:#f0f0ea;padding:4px 8px;border-radius:6px">'+icon(f.name)+'</span>';
      h+='<div><div style="font-size:13px;font-weight:500">'+f.name+'</div><div style="font-size:11px;color:#888">'+f.date+' - '+f.size+'</div></div></div>';
      h+='<div style="display:flex;gap:8px"><a href="'+f.url+'" target="_blank" class="btn" style="font-size:12px;text-decoration:none">Ouvrir</a>';
      h+='<button class="btn" style="font-size:12px;color:#A32D2D" onclick="deleteFichier(\''+sid+'\',\''+f.path+'\')">x</button></div>';
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

function renderAI(s){
  return '<div class="box"><div style="font-weight:600;font-size:14px;margin-bottom:10px">Analyste IA</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<input id="aiq" type="text" placeholder="Ex: Quand atteindre le seuil de rentabilite ?" onkeydown="if(event.key===\'Enter\')askAI()" style="flex:1;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;outline:none"/>'+
    '<button class="btn btn-primary" onclick="askAI()" '+(S.aiLoading?'disabled':'')+'>'+( S.aiLoading?'...':'Analyser')+'</button></div>'+
    (S.aiResp?'<div style="font-size:13px;line-height:1.6;background:#f5f5f0;border-radius:8px;padding:10px 14px;white-space:pre-wrap">'+S.aiResp+'</div>':'')+
    '</div>';
}

function renderNewForm(){
  var f=S.newForm;
  var h='<div class="box"><div style="font-weight:600;font-size:15px;margin-bottom:14px">Nouveau studio</div><div class="form-grid">';
  h+='<div class="fg"><label>Nom</label><input value="'+(f.name||'')+'" oninput="setNF(\'name\',this.value)" placeholder="Ex: Paris 16e"/></div>';
  h+='<div class="fg"><label>Adresse</label><input value="'+(f.addr||'')+'" oninput="setNF(\'addr\',this.value)" placeholder="Rue, CP Ville"/></div>';
  h+='<div class="fg"><label>Societe</label><select onchange="setNF(\'societe\',this.value)"><option>P&W Occitanie</option><option>COBE Society</option><option>SACOBE Society</option></select></div>';
  h+='<div class="fg"><label>Ouverture</label><input value="'+(f.ouverture||'')+'" oninput="setNF(\'ouverture\',this.value)" placeholder="Ex: T2 2027"/></div>';
  h+='<div class="fg"><label>CA annuel BP</label><input type="number" value="'+(f.annualCA||448800)+'" oninput="setNF(\'annualCA\',this.value)"/></div>';
  h+='<div class="fg"><label>Mois ouverture</label><select onchange="setNF(\'moisDebut\',this.value)">';
  MOIS.forEach(function(m,i){h+='<option value="'+i+'" '+(( f.moisDebut||0)==i?'selected':'')+'>'+m+'</option>';});
  h+='</select></div></div>';
  h+='<div class="info-box">Workflow demarre a letape 1 : Test fit local.</div>';
  h+='<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="createStudio()">Creer</button><button class="btn" onclick="toggleNewForm()">Annuler</button></div></div>';
  return h;
}

async function doLogin(){
  var email=document.getElementById('ae').value;
  var pwd=document.getElementById('ap').value;
  var err=document.getElementById('aerr');
  var res=await sb.auth.signInWithPassword({email:email,password:pwd});
  if(res.error){err.style.display='block';err.textContent=res.error.message;return;}
  S.user=res.data.user;
  var prof=await sb.from('profiles').select('*').eq('id',res.data.user.id).single();
  S.profile=prof.data;
  await loadStudios();await loadFiles();await loadDepenses();await loadMessages();
  S.view='dashboard';render();
}
async function doLogout(){await sb.auth.signOut();S.user=null;S.profile=null;S.view='auth';S.selectedId=null;render();}
function openDetail(id){S.view='detail';S.selectedId=id;S.detailTab='workflow';S.aiResp='';render();}
function goBack(){S.view='dashboard';S.selectedId=null;render();}
function setMainTab(t){S.mainTab=t;render();}
function setDetailTab(t){S.detailTab=t;S.aiResp='';render();}
function setFS(s){S.forecastSection=s;S.editMoisIdx=null;render();}
function toggleNewForm(){S.showNewForm=!S.showNewForm;S.newForm={societe:'P&W Occitanie',annualCA:448800,moisDebut:0,annee:2026};render();}
function setNF(k,v){S.newForm[k]=v;}
function setEV(k,v){S.editVals[k]=v;}
function openEditMois(idx){S.editMoisIdx=idx;S.editVals=Object.assign({},S.studios[S.selectedId].forecast.actuel[idx]||{});render();}
function cancelEdit(){S.editMoisIdx=null;render();}

async function toggleStep(sid,stepId){
  var s=S.studios[sid];
  var newSteps=Object.assign({},s.steps);
  newSteps[stepId]=!s.steps[stepId];
  await saveStudio(sid,Object.assign({},s,{steps:newSteps,statut:inferStatut(newSteps)}));
  toast('Etape mise a jour');
}
async function saveMois(){
  var s=S.studios[S.selectedId];
  var newActuel=Object.assign({},s.forecast.actuel);
  newActuel[S.editMoisIdx]=Object.assign({},S.editVals);
  await saveStudio(S.selectedId,Object.assign({},s,{forecast:Object.assign({},s.forecast,{actuel:newActuel})}));
  S.editMoisIdx=null;toast('Saisie enregistree');
}
async function clearMois(){
  var s=S.studios[S.selectedId];
  var newActuel=Object.assign({},s.forecast.actuel);
  delete newActuel[S.editMoisIdx];
  await saveStudio(S.selectedId,Object.assign({},s,{forecast:Object.assign({},s.forecast,{actuel:newActuel})}));
  S.editMoisIdx=null;toast('Mois efface');
}
async function uploadFichier(sid,input){
  var files=Array.from(input.files);if(!files.length)return;
  var prog=document.getElementById('uprog-'+sid);if(prog)prog.style.display='block';
  var ex=await sb.from('studios').select('data').eq('id',sid+'_files').maybeSingle();
  var currentFiles=(ex.data&&ex.data.data&&ex.data.data.files)||S.files[sid]||[];
  currentFiles=currentFiles.slice();
  var added=0;
  for(var i=0;i<files.length;i++){
    var file=files[i];
    var path=sid+'/'+Date.now()+'_'+cleanName(file.name);
    var ur=await sb.storage.from('studio-files').upload(path,file,{upsert:true});
    if(!ur.error){
      var pu=sb.storage.from('studio-files').getPublicUrl(path);
      var size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' Mo':(file.size/1024).toFixed(0)+' Ko';
      currentFiles.push({name:file.name,path:path,url:pu.data.publicUrl,date:new Date().toLocaleDateString('fr-FR'),size:size});
      added++;
    }
  }
  await sb.from('studios').upsert({id:sid+'_files',data:{files:currentFiles},updated_at:new Date().toISOString()});
  S.files[sid]=currentFiles;
  if(prog)prog.style.display='none';
  toast(added+' fichier(s) ajoute(s)');render();
}
async function deleteFichier(sid,path){
  if(!confirm('Supprimer ?'))return;
  await sb.storage.from('studio-files').remove([path]);
  S.files[sid]=(S.files[sid]||[]).filter(function(f){return f.path!==path;});
  await sb.from('studios').upsert({id:sid+'_files',data:{files:S.files[sid]},updated_at:new Date().toISOString()});
  toast('Supprime');render();
}
async function archiverStudio(id){if(!confirm('Archiver ?'))return;await saveStudio(id,Object.assign({},S.studios[id],{statut:'abandonne'}));toast('Archive');}
async function restaurerStudio(id){var s=S.studios[id];await saveStudio(id,Object.assign({},s,{statut:inferStatut(s.steps)}));toast('Restaure');}
async function supprimerStudio(id){
  if(!confirm('Supprimer definitivement ?'))return;
  await sb.from('studios').delete().eq('id',id);
  delete S.studios[id];S.view='dashboard';S.selectedId=null;render();toast('Supprime');
}
async function createStudio(){
  var f=S.newForm;
  if(!f.name||!f.addr||!f.ouverture){toast('Remplissez tous les champs');return;}
  var id='proj_'+Date.now();
  var steps={};STEPS.forEach(function(s){steps[s.id]=false;});
  await saveStudio(id,{name:f.name,addr:f.addr,societe:f.societe||'P&W Occitanie',ouverture:f.ouverture,statut:'pipeline',capex:306200,emprunt:214340,alertes:['Nouveau projet - demarrer par le test fit local'],steps:steps,forecast:{annualCA:num(f.annualCA,448800),moisDebut:num(f.moisDebut,0),annee:num(f.annee,2026),actuel:{}}});
  S.showNewForm=false;toast('Studio cree');
}
async function askAI(){
  var q=document.getElementById('aiq');if(!q||!q.value)return;
  S.aiLoading=true;S.aiResp='';render();
  var s=S.studios[S.selectedId];
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'Expert Club Pilates ISSEO. Studio: '+s.name+', statut: '+s.statut+', CAPEX: '+fmt(s.capex)+', BP: '+fmt(s.forecast.annualCA)+'. Reponds en francais, concis.',messages:[{role:'user',content:q.value}]})});
    var d=await r.json();S.aiResp=(d.content&&d.content[0]&&d.content[0].text)||'Pas de reponse.';
  }catch(e){S.aiResp='Erreur.';}
  S.aiLoading=false;render();
}

function render(){
  var root=document.getElementById('root');
  if(!root)return;
  if(S.view==='auth')root.innerHTML=renderAuth();
  else if(S.view==='dashboard')root.innerHTML=renderDashboard();
  else if(S.view==='detail')root.innerHTML=renderDetail();
}

sb.auth.getSession().then(function(res){
  var session=res.data&&res.data.session;
  if(session){
    S.user=session.user;
    sb.from('profiles').select('*').eq('id',session.user.id).single().then(function(r){
      S.profile=r.data;
      loadStudios().then(function(){
        loadFiles().then(function(){
          loadDepenses().then(function(){
            loadMessages().then(function(){
              S.view='dashboard';render();
            });
          });
        });
      });
    });
  } else {
    render();
  }
});
</script>
